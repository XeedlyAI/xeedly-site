<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img"><title>Why Success Doesn't Fulfill</title>
<defs><pattern id="g" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M 48 0 L 0 0 0 48" fill="none" stroke="#e7e1d6" stroke-width="0.5" opacity="0.6"/></pattern></defs>
<rect width="1200" height="675" fill="#FAF7F2"/><rect width="1200" height="675" fill="url(#g)"/>
<g transform="translate(80, 80)">
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">PRINCIPAL-LIFE · #005</text>
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" y="24">COMPLETER · 6 MIN</text>
</g>
<!-- LEFT: 3 variables card -->
<g transform="translate(80, 200)">
  <rect x="3" y="3" width="540" height="380" rx="14" fill="#0f172a" opacity="0.05"/>
  <rect width="540" height="380" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <rect width="8" height="380" fill="#38b6ff"/>
  <g transform="translate(36, 32)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#38b6ff" font-weight="700" letter-spacing="0.12em">WHAT ACTUALLY PRODUCES FULFILLMENT</text>
    <text font-family="Inter, sans-serif" font-size="20" fill="#0f172a" font-weight="800" y="34">Three variables · not success</text>
  </g>
  <line x1="36" y1="96" x2="504" y2="96" stroke="#e2e8f0"/>
  <g transform="translate(36, 130)" font-family="Inter, sans-serif" font-size="18" fill="#334155">
    <g><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700">01</text><text x="36" y="0" font-weight="700">Alignment</text><text x="36" y="22" font-size="13" fill="#64748b">Daily actions serve what you want</text></g>
    <g transform="translate(0, 64)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700">02</text><text x="36" y="0" font-weight="700">Presence</text><text x="36" y="22" font-size="13" fill="#64748b">Margin to be where you are</text></g>
    <g transform="translate(0, 128)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700">03</text><text x="36" y="0" font-weight="700">Meaning</text><text x="36" y="22" font-size="13" fill="#64748b">Work serves something beyond itself</text></g>
  </g>
  <line x1="36" y1="336" x2="504" y2="336" stroke="#e2e8f0"/>
  <g transform="translate(36, 358)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#ef4444" letter-spacing="0.08em" font-weight="700">SUCCESS CAN INCLUDE ALL THREE — OR EXCLUDE THEM</text>
  </g>
</g>
<g transform="translate(720, 240)">
  <text font-family="Inter, sans-serif" fill="#0f172a" font-weight="800" letter-spacing="-0.02em">
    <tspan x="0" y="0" font-size="42">Why Success</tspan>
    <tspan x="0" y="52" font-size="42">Doesn&apos;t</tspan>
    <tspan x="0" y="112" font-size="42" fill="#38b6ff">Fulfill.</tspan>
  </text>
  <text font-family="Inter, sans-serif" font-size="14" fill="#64748b"><tspan x="0" y="156">The wins are real.</tspan><tspan x="0" y="176">The architecture matters more.</tspan></text>
</g>
<g transform="translate(80, 620)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text></g>
<g transform="translate(1120, 620)" text-anchor="end"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.08em">BRIEFING #005 · LIVE</text></g>
</svg>
