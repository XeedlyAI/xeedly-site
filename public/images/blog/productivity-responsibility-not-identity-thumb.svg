<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img"><title>Productivity Not Identity</title>
<defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern></defs>
<rect width="1200" height="675" fill="#0f172a"/><rect width="1200" height="675" fill="url(#g)"/>
<g transform="translate(80, 80)">
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">PRINCIPAL-LIFE · #007</text>
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" y="24">COMPLETER · 6 MIN</text>
</g>
<!-- LEFT: VS comparison card -->
<g transform="translate(80, 200)">
  <rect width="540" height="170" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <rect width="6" height="170" fill="#ef4444"/>
  <g transform="translate(28, 36)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#ef4444" font-weight="700" letter-spacing="0.12em">✗ PRODUCTIVITY = IDENTITY</text>
    <text font-family="Inter, sans-serif" font-size="18" fill="#f1f5f9" font-weight="700" y="30">Fragile</text>
    <text font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" y="56">Can&apos;t rest · can&apos;t fail · can&apos;t be present</text>
  </g>

  <text transform="translate(270, 200)" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#475569" letter-spacing="0.2em" font-weight="700">VS</text>

  <g transform="translate(0, 220)">
    <rect width="540" height="170" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <rect width="6" height="170" fill="#10b981"/>
    <g transform="translate(28, 36)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#10b981" font-weight="700" letter-spacing="0.12em">✓ PRODUCTIVITY = RESPONSIBILITY</text>
      <text font-family="Inter, sans-serif" font-size="18" fill="#f1f5f9" font-weight="700" y="30">Durable</text>
      <text font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" y="56">Through rest · through failure · through life</text>
    </g>
  </g>
</g>
<g transform="translate(720, 240)">
  <text font-family="Inter, sans-serif" fill="#ffffff" font-weight="800" letter-spacing="-0.02em">
    <tspan x="0" y="0" font-size="40">Productivity is</tspan>
    <tspan x="0" y="50" font-size="40">responsibility.</tspan>
    <tspan x="0" y="110" font-size="32" fill="#38b6ff">Not identity.</tspan>
  </text>
  <text font-family="Inter, sans-serif" font-size="14" fill="#94a3b8"><tspan x="0" y="160">The distinction that matters.</tspan></text>
</g>
<g transform="translate(80, 620)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text></g>
<g transform="translate(1120, 620)" text-anchor="end"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.08em">BRIEFING #007 · LIVE</text></g>
</svg>
