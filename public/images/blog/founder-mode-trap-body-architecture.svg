<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img"><title>Founder mode vs architecture</title>
<defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern></defs>
<rect width="1200" height="675" fill="#0f172a"/><rect width="1200" height="675" fill="url(#g)"/>
<g transform="translate(80, 70)">
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">FOUNDER MODE VS ARCHITECTURE</text>
  <text font-family="Inter, sans-serif" font-size="22" fill="#f1f5f9" font-weight="700" y="32">What replaces the founder in the middle of everything</text>
</g>

<g transform="translate(80, 180)">
  <!-- FOUNDER MODE -->
  <g>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" letter-spacing="0.15em" font-weight="700">FOUNDER MODE · BROKEN</text>
    <g transform="translate(0, 28)">
      <rect width="480" height="380" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>

      <!-- Team nodes -->
      <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#94a3b8" letter-spacing="0.05em">
        <circle cx="80" cy="80" r="20" fill="#0f172a" stroke="#94a3b8"/><text x="80" y="84" text-anchor="middle">T1</text>
        <circle cx="80" cy="160" r="20" fill="#0f172a" stroke="#94a3b8"/><text x="80" y="164" text-anchor="middle">T2</text>
        <circle cx="80" cy="240" r="20" fill="#0f172a" stroke="#94a3b8"/><text x="80" y="244" text-anchor="middle">T3</text>
        <circle cx="80" cy="320" r="20" fill="#0f172a" stroke="#94a3b8"/><text x="80" y="324" text-anchor="middle">T4</text>
      </g>

      <!-- Lines all routing to founder -->
      <g stroke="#ef4444" stroke-width="1.5" fill="none" opacity="0.7">
        <line x1="100" y1="80" x2="290" y2="190"/>
        <line x1="100" y1="160" x2="290" y2="190"/>
        <line x1="100" y1="240" x2="290" y2="190"/>
        <line x1="100" y1="320" x2="290" y2="190"/>
      </g>

      <!-- Founder hub -->
      <circle cx="310" cy="190" r="32" fill="#0f172a" stroke="#ef4444" stroke-width="2.5"/>
      <text x="310" y="186" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700">YOU</text>
      <text x="310" y="200" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="8" fill="#94a3b8">HUB</text>

      <!-- Decision out -->
      <line x1="342" y1="190" x2="430" y2="190" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
      <text x="436" y="186" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#94a3b8">→</text>

      <text x="240" y="360" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" letter-spacing="0.1em" font-weight="700">EVERY DECISION ROUTES TO YOU</text>
    </g>
  </g>

  <!-- ARCHITECTURE -->
  <g transform="translate(560, 0)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" letter-spacing="0.15em" font-weight="700">INTELLIGENCE ARCHITECTURE · SCALES</text>
    <g transform="translate(0, 28)">
      <rect width="480" height="380" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>

      <!-- Team nodes -->
      <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#94a3b8" letter-spacing="0.05em">
        <circle cx="80" cy="80" r="20" fill="#0f172a" stroke="#10b981"/><text x="80" y="84" text-anchor="middle" fill="#10b981">T1</text>
        <circle cx="80" cy="160" r="20" fill="#0f172a" stroke="#10b981"/><text x="80" y="164" text-anchor="middle" fill="#10b981">T2</text>
        <circle cx="80" cy="240" r="20" fill="#0f172a" stroke="#10b981"/><text x="80" y="244" text-anchor="middle" fill="#10b981">T3</text>
        <circle cx="80" cy="320" r="20" fill="#0f172a" stroke="#10b981"/><text x="80" y="324" text-anchor="middle" fill="#10b981">T4</text>
      </g>

      <!-- Lines to intelligence layer -->
      <g stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.5">
        <line x1="100" y1="80" x2="200" y2="190"/>
        <line x1="100" y1="160" x2="200" y2="190"/>
        <line x1="100" y1="240" x2="200" y2="190"/>
        <line x1="100" y1="320" x2="200" y2="190"/>
      </g>

      <!-- Intelligence Layer -->
      <rect x="180" y="170" width="120" height="40" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
      <text x="240" y="186" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#10b981" font-weight="700">INTELLIGENCE</text>
      <text x="240" y="200" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#10b981" font-weight="700">LAYER</text>

      <!-- Single line to founder (exceptions only) -->
      <line x1="300" y1="190" x2="350" y2="190" stroke="#10b981" stroke-width="2" stroke-dasharray="3 3"/>

      <!-- Founder (light load) -->
      <circle cx="370" cy="190" r="20" fill="#0f172a" stroke="#38b6ff" stroke-width="2"/>
      <text x="370" y="186" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#38b6ff" font-weight="700">YOU</text>
      <text x="370" y="200" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="8" fill="#94a3b8">LEAD</text>

      <text x="240" y="360" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" letter-spacing="0.1em" font-weight="700">EXCEPTIONS ONLY · ROUTINE STAYS QUIET</text>
    </g>
  </g>
</g>

<g transform="translate(80, 638)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">FIGURE 1 · FOUNDER MODE VS ARCHITECTURAL REPLACEMENT</text></g>
</svg>
