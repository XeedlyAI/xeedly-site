<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="b10-title">
  <title id="b10-title">Residential leads vs HOA preferred vendor programs</title>
  <defs><pattern id="b10-grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern></defs>
  <rect width="1200" height="675" fill="#0f172a"/><rect width="1200" height="675" fill="url(#b10-grid)"/>

  <g transform="translate(80, 70)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">CHANNEL ECONOMICS · HOME SERVICES</text>
    <text font-family="Inter, sans-serif" font-size="22" fill="#f1f5f9" font-weight="700" y="32">Residential ads vs HOA preferred vendor programs</text>
  </g>

  <g transform="translate(80, 180)">
    <!-- Residential column -->
    <g>
      <rect width="520" height="420" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
      <rect width="5" height="420" fill="#94a3b8"/>
      <g transform="translate(28, 32)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" font-weight="700" letter-spacing="0.12em">RESIDENTIAL LEAD CHANNELS</text>
        <text font-family="Inter, sans-serif" font-size="20" fill="#f1f5f9" font-weight="700" y="28">Google Ads · Yelp · Angi · Facebook</text>
      </g>
      <line x1="28" y1="92" x2="492" y2="92" stroke="#334155"/>
      <g transform="translate(28, 116)" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1">
        <g><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.1em">COST PER LEAD</text><text x="0" y="22" font-size="22" fill="#ef4444" font-weight="800">$80–$150</text></g>
        <g transform="translate(0, 64)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.1em">CLOSE RATE</text><text x="0" y="22" font-size="22" fill="#f1f5f9" font-weight="800">20–30%</text></g>
        <g transform="translate(0, 128)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.1em">JOB FREQUENCY</text><text x="0" y="22" font-size="18" fill="#f1f5f9" font-weight="700">One-off</text></g>
        <g transform="translate(0, 192)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.1em">PAYMENT TERMS</text><text x="0" y="22" font-size="18" fill="#f1f5f9" font-weight="700">Net-now / collection risk</text></g>
        <g transform="translate(0, 256)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.1em">PRICE SENSITIVITY</text><text x="0" y="22" font-size="18" fill="#ef4444" font-weight="700">High · haggle expected</text></g>
      </g>
    </g>

    <!-- HOA column -->
    <g transform="translate(540, 0)">
      <rect width="500" height="420" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
      <rect width="5" height="420" fill="#10b981"/>
      <g transform="translate(28, 32)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" font-weight="700" letter-spacing="0.12em">HOA PREFERRED VENDOR PROGRAM</text>
        <text font-family="Inter, sans-serif" font-size="20" fill="#f1f5f9" font-weight="700" y="28">PropertyJobz · Direct mgmt co. relationships</text>
      </g>
      <line x1="28" y1="92" x2="472" y2="92" stroke="#334155"/>
      <g transform="translate(28, 116)" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1">
        <g><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.1em">COST PER LEAD</text><text x="0" y="22" font-size="22" fill="#10b981" font-weight="800">~$0 · revenue-share</text></g>
        <g transform="translate(0, 64)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.1em">CLOSE RATE</text><text x="0" y="22" font-size="22" fill="#f1f5f9" font-weight="800">60–80% (qualified)</text></g>
        <g transform="translate(0, 128)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.1em">JOB FREQUENCY</text><text x="0" y="22" font-size="18" fill="#10b981" font-weight="700">Recurring · multi-property</text></g>
        <g transform="translate(0, 192)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.1em">PAYMENT TERMS</text><text x="0" y="22" font-size="18" fill="#10b981" font-weight="700">Net-30 · commercial AR</text></g>
        <g transform="translate(0, 256)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.1em">PRICE SENSITIVITY</text><text x="0" y="22" font-size="18" fill="#10b981" font-weight="700">Low · quality &gt; cheapest</text></g>
      </g>
    </g>
  </g>

  <g transform="translate(80, 638)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">FIGURE 1 · WHY HOA WORK BEATS RESIDENTIAL ADS</text></g>
</svg>
