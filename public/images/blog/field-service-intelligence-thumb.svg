<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t11-title">
  <title id="t11-title">Field Service Intelligence — thumbnail</title>
  <defs><pattern id="t11-grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M 48 0 L 0 0 0 48" fill="none" stroke="#bae6fd" stroke-width="0.5" opacity="0.5"/></pattern></defs>
  <rect width="1200" height="675" fill="#F0F9FF"/><rect width="1200" height="675" fill="url(#t11-grid)"/>
  <g transform="translate(80, 80)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#0A8FD4" font-weight="700" letter-spacing="0.15em">MULTI-UNIT-OPS · HS-3</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#64748b" letter-spacing="0.1em" y="22">MAGNETIZER · 7 MIN</text>
  </g>
  <!-- Architecture diagram: CRM/Tools → Intelligence Layer → Signals -->
  <g transform="translate(80, 200)">
    <!-- Bottom: existing tools -->
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#64748b" letter-spacing="0.12em" y="0">EXISTING TOOLS</text>
    <g transform="translate(0, 16)">
      <rect width="100" height="40" rx="6" fill="#fff" stroke="#94a3b8"/><text x="50" y="25" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#475569">CRM</text>
      <rect x="110" width="100" height="40" rx="6" fill="#fff" stroke="#94a3b8"/><text x="160" y="25" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#475569">QUICKBOOKS</text>
      <rect x="220" width="100" height="40" rx="6" fill="#fff" stroke="#94a3b8"/><text x="270" y="25" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#475569">STRIPE</text>
      <rect x="330" width="100" height="40" rx="6" fill="#fff" stroke="#94a3b8"/><text x="380" y="25" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#475569">CALENDAR</text>
      <rect x="440" width="100" height="40" rx="6" fill="#fff" stroke="#94a3b8"/><text x="490" y="25" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#475569">SMS</text>
    </g>
    <!-- Up arrows -->
    <g transform="translate(50, 70)" stroke="#38b6ff" stroke-width="2" fill="none">
      <line x1="0" y1="0" x2="0" y2="32"/><polygon points="-5,28 0,38 5,28" fill="#38b6ff" stroke="none"/>
      <line x1="110" y1="0" x2="110" y2="32"/><polygon points="105,28 110,38 115,28" fill="#38b6ff" stroke="none"/>
      <line x1="220" y1="0" x2="220" y2="32"/><polygon points="215,28 220,38 225,28" fill="#38b6ff" stroke="none"/>
      <line x1="330" y1="0" x2="330" y2="32"/><polygon points="325,28 330,38 335,28" fill="#38b6ff" stroke="none"/>
      <line x1="440" y1="0" x2="440" y2="32"/><polygon points="435,28 440,38 445,28" fill="#38b6ff" stroke="none"/>
    </g>
    <!-- Middle: Intelligence Layer -->
    <g transform="translate(0, 130)">
      <rect width="540" height="60" rx="8" fill="#38b6ff"/>
      <text x="270" y="30" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#ffffff" font-weight="700" letter-spacing="0.15em">INTELLIGENCE LAYER</text>
      <text x="270" y="48" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#bae6fd" letter-spacing="0.1em">EVENT BUS · SIGNAL ENGINE · MULTI-CHANNEL</text>
    </g>
    <!-- Up arrows -->
    <g transform="translate(50, 200)" stroke="#0f172a" stroke-width="2" fill="none">
      <line x1="0" y1="0" x2="0" y2="32"/><polygon points="-5,28 0,38 5,28" fill="#0f172a" stroke="none"/>
      <line x1="220" y1="0" x2="220" y2="32"/><polygon points="215,28 220,38 225,28" fill="#0f172a" stroke="none"/>
      <line x1="440" y1="0" x2="440" y2="32"/><polygon points="435,28 440,38 445,28" fill="#0f172a" stroke="none"/>
    </g>
    <!-- Top: Signals to owner -->
    <g transform="translate(0, 250)">
      <rect width="160" height="50" rx="6" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
      <text x="80" y="22" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#ef4444" font-weight="700">AGED QUOTE</text>
      <text x="80" y="38" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#475569">→ FOLLOW UP</text>

      <rect x="220" width="160" height="50" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="300" y="22" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#d97706" font-weight="700">CERT EXPIRING</text>
      <text x="300" y="38" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#475569">→ RENEW IN 30D</text>

      <rect x="440" width="100" height="50" rx="6" fill="#fff" stroke="#10b981" stroke-width="1.5"/>
      <text x="490" y="22" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#10b981" font-weight="700">AR OK</text>
      <text x="490" y="38" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#475569">→ NORMAL</text>
    </g>
  </g>
  <g transform="translate(700, 240)">
    <text font-family="Inter, sans-serif" fill="#0f172a" font-weight="800" letter-spacing="-0.02em">
      <tspan x="0" y="0" font-size="40">Field Service</tspan>
      <tspan x="0" y="48" font-size="40" fill="#38b6ff">Intelligence.</tspan>
    </text>
    <text font-family="Inter, sans-serif" font-size="13" fill="#475569" y="92"><tspan x="0">Beyond the spreadsheet.</tspan><tspan x="0" y="20">Beyond the CRM.</tspan></text>
  </g>
  <g transform="translate(80, 620)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text></g>
  <g transform="translate(1120, 620)" text-anchor="end"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.08em">BRIEFING HS-3 · LIVE</text></g>
</svg>
