<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t11-title">
  <title id="t11-title">Field Service Intelligence — thumbnail</title>
  <defs><pattern id="t11-grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M 48 0 L 0 0 0 48" fill="none" stroke="#bae6fd" stroke-width="0.5" opacity="0.5"/></pattern></defs>
  <rect width="1200" height="675" fill="#F0F9FF"/><rect width="1200" height="675" fill="url(#t11-grid)"/>
  <g transform="translate(80, 80)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#0A8FD4" font-weight="700" letter-spacing="0.15em">MULTI-UNIT-OPS · HS-3</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" y="24">MAGNETIZER · 7 MIN</text>
  </g>

  <!-- LEFT: Single iconic "Intelligence Layer" sandwich -->
  <g transform="translate(80, 200)">
    <!-- Tools above (collapsed bar) -->
    <rect width="500" height="50" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="250" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#64748b" letter-spacing="0.15em" font-weight="700">YOUR EXISTING TOOLS</text>

    <!-- Arrows -->
    <g transform="translate(0, 60)" stroke="#38b6ff" stroke-width="3" fill="none">
      <line x1="125" y1="0" x2="125" y2="32"/><polygon points="118,26 125,38 132,26" fill="#38b6ff" stroke="none"/>
      <line x1="250" y1="0" x2="250" y2="32"/><polygon points="243,26 250,38 257,26" fill="#38b6ff" stroke="none"/>
      <line x1="375" y1="0" x2="375" y2="32"/><polygon points="368,26 375,38 382,26" fill="#38b6ff" stroke="none"/>
    </g>

    <!-- THE INTELLIGENCE LAYER (hero element) -->
    <g transform="translate(0, 108)">
      <rect width="500" height="140" rx="12" fill="#38b6ff"/>
      <text x="250" y="62" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" fill="#ffffff" font-weight="800" letter-spacing="-0.01em">Intelligence Layer</text>
      <text x="250" y="98" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#bae6fd" letter-spacing="0.15em">EVENT BUS · SIGNAL ENGINE</text>
      <text x="250" y="120" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#bae6fd" letter-spacing="0.15em">MULTI-CHANNEL DELIVERY</text>
    </g>

    <!-- Arrows down -->
    <g transform="translate(0, 260)" stroke="#0f172a" stroke-width="3" fill="none">
      <line x1="125" y1="0" x2="125" y2="32"/><polygon points="118,26 125,38 132,26" fill="#0f172a" stroke="none"/>
      <line x1="250" y1="0" x2="250" y2="32"/><polygon points="243,26 250,38 257,26" fill="#0f172a" stroke="none"/>
      <line x1="375" y1="0" x2="375" y2="32"/><polygon points="368,26 375,38 382,26" fill="#0f172a" stroke="none"/>
    </g>

    <!-- Signals below -->
    <g transform="translate(0, 308)">
      <rect width="500" height="50" rx="8" fill="#0f172a"/>
      <text x="250" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#38b6ff" letter-spacing="0.15em" font-weight="700">SIGNALS TO YOUR TEAM</text>
    </g>
  </g>

  <!-- RIGHT: Big title -->
  <g transform="translate(720, 270)">
    <text font-family="Inter, sans-serif" fill="#0f172a" font-weight="800" letter-spacing="-0.02em">
      <tspan x="0" y="0" font-size="56">Field</tspan>
      <tspan x="0" y="66" font-size="56">Service</tspan>
      <tspan x="0" y="132" font-size="56" fill="#38b6ff">Intelligence.</tspan>
    </text>
  </g>

  <g transform="translate(80, 620)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text></g>
  <g transform="translate(1120, 620)" text-anchor="end"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.08em">BRIEFING HS-3 · LIVE</text></g>
</svg>
