<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img"><title>Leading vs Operating</title>
<defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5" opacity="0.6"/></pattern></defs>
<rect width="1200" height="675" fill="#FAFAFA"/><rect width="1200" height="675" fill="url(#g)"/>
<g transform="translate(80, 80)">
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">PRINCIPAL-LIFE · #010</text>
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" y="24">HIGH-INTENT COMMERCIAL · 6 MIN</text>
</g>
<!-- LEFT: Big stat card with split bar -->
<g transform="translate(80, 200)">
  <rect x="3" y="3" width="540" height="380" rx="14" fill="#0f172a" opacity="0.05"/>
  <rect width="540" height="380" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <rect width="8" height="380" fill="#38b6ff"/>

  <g transform="translate(40, 56)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">YOUR WEEK · BE HONEST</text>
  </g>

  <!-- Today bar -->
  <g transform="translate(40, 110)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#64748b" letter-spacing="0.1em" font-weight="700">TODAY</text>
    <g transform="translate(0, 16)">
      <rect width="460" height="44" rx="6" fill="#fee2e2"/>
      <rect width="368" height="44" rx="6" fill="#ef4444"/>
      <text x="184" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#ffffff" font-weight="700">80% OPERATING</text>
      <text x="414" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#7f1d1d" font-weight="700">20%</text>
    </g>
  </g>

  <!-- Healthy bar -->
  <g transform="translate(40, 200)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#64748b" letter-spacing="0.1em" font-weight="700">HEALTHY TARGET</text>
    <g transform="translate(0, 16)">
      <rect width="460" height="44" rx="6" fill="#dcfce7"/>
      <rect width="184" height="44" rx="6" fill="#10b981"/>
      <text x="92" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#ffffff" font-weight="700">40% OP</text>
      <text x="322" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#065f46" font-weight="700">60% LEADING</text>
    </g>
  </g>

  <line x1="40" y1="296" x2="500" y2="296" stroke="#e2e8f0"/>
  <g transform="translate(40, 322)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" font-weight="700">THE SHIFT IS ARCHITECTURAL</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#10b981" font-weight="700" letter-spacing="0.1em" y="22">NOT MOTIVATIONAL</text>
  </g>
</g>
<!-- RIGHT title -->
<g transform="translate(720, 280)">
  <text font-family="Inter, sans-serif" fill="#0f172a" font-weight="800" letter-spacing="-0.02em">
    <tspan x="0" y="0" font-size="48">Lead.</tspan>
    <tspan x="0" y="60" font-size="48">Don&apos;t</tspan>
    <tspan x="0" y="120" font-size="48" fill="#38b6ff">operate.</tspan>
  </text>
</g>
<g transform="translate(80, 620)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text></g>
<g transform="translate(1120, 620)" text-anchor="end"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.08em">BRIEFING #010 · LIVE</text></g>
</svg>
