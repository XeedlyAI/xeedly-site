<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t12-title">
  <title id="t12-title">Multi-Crew Quote-to-Cash — thumbnail</title>
  <defs><pattern id="t12-grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5" opacity="0.6"/></pattern></defs>
  <rect width="1200" height="675" fill="#FAFAFA"/><rect width="1200" height="675" fill="url(#t12-grid)"/>
  <g transform="translate(80, 80)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">MULTI-UNIT-OPS · HS-4</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" y="24">MAGNETIZER · 7 MIN</text>
  </g>

  <!-- LEFT: Single big stat card with one hero number -->
  <g transform="translate(80, 200)">
    <rect x="3" y="3" width="540" height="380" rx="14" fill="#0f172a" opacity="0.05"/>
    <rect width="540" height="380" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="8" height="380" fill="#ef4444"/>

    <g transform="translate(40, 56)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#ef4444" font-weight="700" letter-spacing="0.15em">QUOTE-TO-CASH LEAKAGE</text>
    </g>

    <!-- Big hero number -->
    <g transform="translate(40, 170)">
      <text font-family="Inter, sans-serif" font-size="100" fill="#ef4444" font-weight="900" letter-spacing="-0.04em">−66%</text>
    </g>

    <g transform="translate(40, 220)">
      <text font-family="Inter, sans-serif" font-size="18" fill="#0f172a" font-weight="700">of leads lost between</text>
      <text font-family="Inter, sans-serif" font-size="18" fill="#0f172a" font-weight="700" y="26">quote and paid invoice</text>
    </g>

    <line x1="40" y1="296" x2="500" y2="296" stroke="#e2e8f0"/>

    <g transform="translate(40, 322)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" font-weight="700">5 LEAK POINTS · 1 PIPELINE</text>
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#10b981" letter-spacing="0.1em" font-weight="700" y="24">FIX = +8–15% REVENUE</text>
    </g>
  </g>

  <!-- RIGHT: Big title -->
  <g transform="translate(700, 250)">
    <text font-family="Inter, sans-serif" fill="#0f172a" font-weight="800" letter-spacing="-0.02em">
      <tspan x="0" y="0" font-size="50">Where</tspan>
      <tspan x="0" y="60" font-size="50">Home Services</tspan>
      <tspan x="0" y="120" font-size="50" fill="#ef4444">Leak Money.</tspan>
    </text>
  </g>

  <g transform="translate(80, 620)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text></g>
  <g transform="translate(1120, 620)" text-anchor="end"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.08em">BRIEFING HS-4 · LIVE</text></g>
</svg>
