<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img"><title>Cross-System Correlation</title>
<defs><pattern id="g" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M 48 0 L 0 0 0 48" fill="none" stroke="#bae6fd" stroke-width="0.5" opacity="0.5"/></pattern></defs>
<rect width="1200" height="675" fill="#F0F9FF"/><rect width="1200" height="675" fill="url(#g)"/>
<g transform="translate(80, 80)">
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#0A8FD4" font-weight="700" letter-spacing="0.15em">PRINCIPAL-INTELLIGENCE · #003</text>
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" y="24">MAGNETIZER · 7 MIN</text>
</g>
<!-- LEFT: 2 system cards with correlation arrow + signal -->
<g transform="translate(80, 220)">
  <!-- System A -->
  <rect width="200" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <rect width="5" height="80" fill="#f59e0b"/>
  <text x="20" y="32" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#d97706" font-weight="700" letter-spacing="0.1em">VENDOR SYSTEM</text>
  <text x="20" y="56" font-family="Inter, sans-serif" font-size="15" fill="#0f172a" font-weight="700">Insurance LAPSED</text>
  <!-- System B -->
  <g transform="translate(360, 0)">
    <rect width="200" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <rect width="5" height="80" fill="#f59e0b"/>
    <text x="20" y="32" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#d97706" font-weight="700" letter-spacing="0.1em">WORK ORDER SYSTEM</text>
    <text x="20" y="56" font-family="Inter, sans-serif" font-size="15" fill="#0f172a" font-weight="700">3 jobs pending</text>
  </g>
  <!-- Correlation symbol -->
  <text x="280" y="50" text-anchor="middle" font-family="Inter, sans-serif" font-size="36" fill="#38b6ff" font-weight="800">+</text>

  <!-- Correlation arrow down -->
  <g transform="translate(280, 100)"><line x1="0" y1="0" x2="0" y2="40" stroke="#38b6ff" stroke-width="3"/><polygon points="-6,36 0,46 6,36" fill="#38b6ff"/></g>

  <!-- Signal output -->
  <g transform="translate(40, 160)">
    <rect width="480" height="80" rx="8" fill="#0f172a"/>
    <rect width="5" height="80" fill="#ef4444"/>
    <text x="20" y="32" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#ef4444" font-weight="700" letter-spacing="0.12em">HIGH-SEVERITY CORRELATION DETECTED</text>
    <text x="20" y="58" font-family="Inter, sans-serif" font-size="16" fill="#ffffff" font-weight="700">Compliance exposure across 3 communities</text>
  </g>

  <text x="280" y="280" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#64748b" letter-spacing="0.12em" font-weight="700">PATTERNS NO SINGLE TOOL CAN SEE</text>
</g>
<!-- RIGHT title -->
<g transform="translate(720, 260)">
  <text font-family="Inter, sans-serif" fill="#0f172a" font-weight="800" letter-spacing="-0.02em">
    <tspan x="0" y="0" font-size="52">Cross-System</tspan>
    <tspan x="0" y="62" font-size="52" fill="#38b6ff">Correlation.</tspan>
  </text>
  <text font-family="Inter, sans-serif" font-size="15" fill="#64748b"><tspan x="0" y="108">The pattern humans miss.</tspan></text>
</g>
<g transform="translate(80, 620)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text></g>
<g transform="translate(1120, 620)" text-anchor="end"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.08em">BRIEFING #003 · LIVE</text></g>
</svg>
