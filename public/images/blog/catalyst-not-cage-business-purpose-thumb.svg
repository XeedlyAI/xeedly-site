<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t6-title">
  <title id="t6-title">Catalyst, Not Cage — thumbnail</title>
  <defs>
    <pattern id="t6-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Dark navy -->
  <rect width="1200" height="675" fill="#0f172a"/>
  <rect width="1200" height="675" fill="url(#t6-grid)"/>

  <g transform="translate(80, 80)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">PRINCIPAL-LIFE · #006</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#64748b" letter-spacing="0.1em" y="22">MAGNETIZER · 6 MIN</text>
  </g>

  <!-- DOMINANT ELEMENT: Two contrasting frames — cage vs catalyst -->
  <g transform="translate(80, 200)">
    <!-- CAGE frame (left) -->
    <g>
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#ef4444" letter-spacing="0.15em" font-weight="700">CAGE</text>
      <g transform="translate(0, 18)">
        <rect width="260" height="280" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
        <!-- Bars suggesting enclosure -->
        <g stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.5">
          <line x1="40" y1="20" x2="40" y2="260"/>
          <line x1="80" y1="20" x2="80" y2="260"/>
          <line x1="120" y1="20" x2="120" y2="260"/>
          <line x1="160" y1="20" x2="160" y2="260"/>
          <line x1="200" y1="20" x2="200" y2="260"/>
          <line x1="220" y1="20" x2="220" y2="260"/>
        </g>
        <!-- Inner principal indicator -->
        <circle cx="130" cy="140" r="22" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="2"/>
        <text x="130" y="143" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700">YOU</text>
        <text x="130" y="220" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.08em">CONSUMED</text>
      </g>
    </g>

    <!-- Divider -->
    <g transform="translate(300, 40)">
      <text x="0" y="148" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#475569" letter-spacing="0.2em" font-weight="600">VS</text>
    </g>

    <!-- CATALYST frame (right) -->
    <g transform="translate(360, 0)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#10b981" letter-spacing="0.15em" font-weight="700">CATALYST</text>
      <g transform="translate(0, 18)">
        <rect width="260" height="280" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
        <!-- Open architecture suggesting freedom -->
        <g stroke="#10b981" stroke-width="1.5" opacity="0.4">
          <line x1="40" y1="40" x2="220" y2="40"/>
          <line x1="40" y1="240" x2="220" y2="240"/>
        </g>
        <!-- Outgoing arrows suggesting expansion -->
        <g stroke="#10b981" stroke-width="1.5" fill="none">
          <line x1="130" y1="140" x2="60" y2="80"/>
          <polygon points="58,76 56,86 66,84" fill="#10b981"/>
          <line x1="130" y1="140" x2="200" y2="80"/>
          <polygon points="202,76 194,84 204,86" fill="#10b981"/>
          <line x1="130" y1="140" x2="60" y2="200"/>
          <polygon points="58,204 66,196 56,194" fill="#10b981"/>
          <line x1="130" y1="140" x2="200" y2="200"/>
          <polygon points="202,204 204,194 194,196" fill="#10b981"/>
        </g>
        <circle cx="130" cy="140" r="22" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="2"/>
        <text x="130" y="143" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" font-weight="700">YOU</text>
        <text x="130" y="220" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.08em">BECOMING</text>
      </g>
    </g>
  </g>

  <!-- Right side title -->
  <g transform="translate(770, 230)">
    <text font-family="Inter, sans-serif" fill="#ffffff" font-weight="800" letter-spacing="-0.02em">
      <tspan x="0" y="0" font-size="42">Catalyst,</tspan>
      <tspan x="0" y="52" font-size="42" fill="#10b981">not cage.</tspan>
    </text>
    <text font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" letter-spacing="0" y="92">
      <tspan x="0">Reframing what a</tspan>
      <tspan x="0" y="112">business is for.</tspan>
    </text>
  </g>

  <g transform="translate(80, 620)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text>
  </g>
  <g transform="translate(1120, 620)" text-anchor="end">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.08em">BRIEFING-006 · LIVE</text>
  </g>
</svg>
