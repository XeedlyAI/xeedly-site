    <g transform="translate(0, 32)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#f59e0b" font-weight="700">02</text><text x="32" y="0" font-weight="600">Cost Position</text></g>
    <g transform="translate(0, 64)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700">03</text><text x="32" y="0" font-weight="600">Operations</text></g>
