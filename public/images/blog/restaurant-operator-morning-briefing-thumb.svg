    <g transform="translate(0, 160)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700">06</text><text x="32" y="0" font-weight="600">Today&apos;s Priorities</text></g>
