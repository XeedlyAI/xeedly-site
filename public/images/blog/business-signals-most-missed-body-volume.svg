<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img"><title>Daily signal volume by category</title>
<defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern></defs>
<rect width="1200" height="675" fill="#0f172a"/><rect width="1200" height="675" fill="url(#g)"/>
<g transform="translate(80, 70)">
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">DAILY SIGNAL VOLUME · BY CATEGORY</text>
  <text font-family="Inter, sans-serif" font-size="22" fill="#f1f5f9" font-weight="700" y="32">Typical operational business · 1,500+ events/day</text>
</g>
<!-- 7 horizontal bars -->
<g transform="translate(280, 180)" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1">
  <g><text x="-20" y="20" text-anchor="end" font-weight="600">Vendor</text><rect x="0" y="6" width="240" height="20" rx="4" fill="#14b8a6"/><text x="260" y="20" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#14b8a6" font-weight="700">~80 / day</text></g>
  <g transform="translate(0, 50)"><text x="-20" y="20" text-anchor="end" font-weight="600">Revenue</text><rect x="0" y="6" width="540" height="20" rx="4" fill="#38b6ff"/><text x="560" y="20" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700">~180 / day</text></g>
  <g transform="translate(0, 100)"><text x="-20" y="20" text-anchor="end" font-weight="600">Communication</text><rect x="0" y="6" width="720" height="20" rx="4" fill="#8b5cf6"/><text x="740" y="20" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#8b5cf6" font-weight="700">~240 / day</text></g>
  <g transform="translate(0, 150)"><text x="-20" y="20" text-anchor="end" font-weight="600">Compliance</text><rect x="0" y="6" width="180" height="20" rx="4" fill="#f59e0b"/><text x="200" y="20" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#f59e0b" font-weight="700">~60 / day</text></g>
  <g transform="translate(0, 200)"><text x="-20" y="20" text-anchor="end" font-weight="600">Scheduling</text><rect x="0" y="6" width="360" height="20" rx="4" fill="#10b981"/><text x="380" y="20" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" font-weight="700">~120 / day</text></g>
  <g transform="translate(0, 250)"><text x="-20" y="20" text-anchor="end" font-weight="600">Payment</text><rect x="0" y="6" width="660" height="20" rx="4" fill="#ef4444"/><text x="680" y="20" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700">~220 / day</text></g>
  <g transform="translate(0, 300)"><text x="-20" y="20" text-anchor="end" font-weight="600">System health</text><rect x="0" y="6" width="120" height="20" rx="4" fill="#64748b"/><text x="140" y="20" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#64748b" font-weight="700">~40 / day</text></g>
</g>
<g transform="translate(280, 540)">
  <rect width="820" height="64" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="20" y="26" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700" letter-spacing="0.12em">THE PROBLEM</text>
  <text x="20" y="48" font-family="Inter, sans-serif" font-size="14" fill="#f1f5f9" font-weight="600">~940 events daily · most scattered across tools · ~99% never reach the leader</text>
</g>
<g transform="translate(80, 638)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">FIGURE 1 · DAILY SIGNAL VOLUME</text></g>
</svg>
