<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="thumb-title">
  <title id="thumb-title">What Is Operational Intelligence — Briefing thumbnail</title>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#38b6ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#0f172a"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <ellipse cx="600" cy="338" rx="500" ry="280" fill="url(#glow)"/>

  <!-- Title block -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#38b6ff" font-weight="600" letter-spacing="0.15em">
    <text x="80" y="100" font-size="14">PRINCIPAL-INTELLIGENCE</text>
    <text x="80" y="125" font-size="11" fill="#64748b">BRIEFING · FRONT-DOOR</text>
  </g>

  <!-- Three-tier stack visual -->
  <g transform="translate(80, 180)">
    <!-- GLANCE -->
    <rect x="0" y="0" width="320" height="100" rx="4" fill="#1e293b" stroke="#14b8a6" stroke-width="2"/>
    <rect x="0" y="0" width="4" height="100" fill="#14b8a6"/>
    <text x="20" y="32" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#14b8a6" font-weight="700" letter-spacing="0.1em">GLANCE</text>
    <text x="20" y="56" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">0–5 SECONDS</text>
    <text x="20" y="80" font-family="Inter, sans-serif" font-size="13" fill="#cbd5e1">KPI ticker · ambient awareness</text>

    <!-- BRIEFING -->
    <rect x="0" y="120" width="320" height="100" rx="4" fill="#1e293b" stroke="#38b6ff" stroke-width="2"/>
    <rect x="0" y="120" width="4" height="100" fill="#38b6ff"/>
    <text x="20" y="152" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.1em">BRIEFING</text>
    <text x="20" y="176" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">5–60 SECONDS</text>
    <text x="20" y="200" font-family="Inter, sans-serif" font-size="13" fill="#cbd5e1">AI morning briefing · prioritized</text>

    <!-- DEEP -->
    <rect x="0" y="240" width="320" height="100" rx="4" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="0" y="240" width="4" height="100" fill="#8b5cf6"/>
    <text x="20" y="272" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#8b5cf6" font-weight="700" letter-spacing="0.1em">DEEP</text>
    <text x="20" y="296" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">1–5 MINUTES</text>
    <text x="20" y="320" font-family="Inter, sans-serif" font-size="13" fill="#cbd5e1">Signal feed · AI concierge</text>
  </g>

  <!-- Arrows + delivery -->
  <g transform="translate(440, 240)">
    <path d="M 0 60 L 80 60" stroke="#38b6ff" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
    <path d="M 0 60 L 80 60" stroke="#38b6ff" stroke-width="2" fill="none"/>
    <polygon points="80,55 88,60 80,65" fill="#38b6ff"/>
  </g>

  <!-- Headline -->
  <g transform="translate(560, 200)">
    <text font-family="Inter, sans-serif" fill="#ffffff" font-weight="700" font-size="44" letter-spacing="-0.02em">
      <tspan x="0" y="0">What Is</tspan>
      <tspan x="0" y="52">Operational</tspan>
      <tspan x="0" y="104" fill="#38b6ff">Intelligence?</tspan>
    </text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#94a3b8" letter-spacing="0.05em">
      <tspan x="0" y="160">AND WHY DASHBOARDS</tspan>
      <tspan x="0" y="180">DON'T DELIVER IT</tspan>
    </text>

    <!-- Status chip -->
    <g transform="translate(0, 220)">
      <rect width="180" height="28" rx="14" fill="none" stroke="#38b6ff" stroke-width="1"/>
      <circle cx="14" cy="14" r="3" fill="#38b6ff"/>
      <text x="26" y="19" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="600" letter-spacing="0.08em">7 MIN BRIEFING</text>
    </g>
  </g>

  <!-- Footer brand mark -->
  <g transform="translate(80, 610)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text>
  </g>
  <g transform="translate(1120, 610)" text-anchor="end">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.08em">SIGNAL-001</text>
  </g>
</svg>
