<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="thumb-title">
  <title id="thumb-title">What Is Operational Intelligence — Briefing thumbnail</title>
  <defs>
    <pattern id="thumb-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#e2e8f0" stroke-width="0.5" opacity="0.6"/>
    </pattern>
  </defs>

  <!-- Off-white background -->
  <rect width="1200" height="675" fill="#FAFAFA"/>
  <rect width="1200" height="675" fill="url(#thumb-grid)"/>

  <!-- Silo tag (top-left) -->
  <g transform="translate(80, 80)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">PRINCIPAL-INTELLIGENCE · #001</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#64748b" letter-spacing="0.1em" y="22">FRONT-DOOR BRIEFING · 7 MIN</text>
  </g>

  <!-- Right-side title (smaller, supporting role) -->
  <g transform="translate(680, 220)">
    <text font-family="Inter, sans-serif" fill="#0f172a" font-weight="800" letter-spacing="-0.02em">
      <tspan x="0" y="0" font-size="42">What is</tspan>
      <tspan x="0" y="50" font-size="42">operational</tspan>
      <tspan x="0" y="100" font-size="42" fill="#38b6ff">intelligence?</tspan>
    </text>
    <text font-family="Inter, sans-serif" font-size="15" fill="#475569" letter-spacing="0" y="138">
      <tspan x="0">And why dashboards</tspan>
      <tspan x="0" y="158">don&apos;t deliver it.</tspan>
    </text>
  </g>

  <!-- DOMINANT ELEMENT: Mock briefing card (left side) -->
  <g transform="translate(80, 180)">
    <!-- Card shadow / depth -->
    <rect x="2" y="2" width="540" height="380" rx="10" fill="#0f172a" opacity="0.04"/>
    <!-- Card body -->
    <rect width="540" height="380" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Left-border accent -->
    <rect width="5" height="380" rx="0" fill="#38b6ff"/>

    <!-- Card header -->
    <g transform="translate(28, 32)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700" letter-spacing="0.12em">DAILY BRIEFING · TUE · 06:00 AM</text>
      <text font-family="Inter, sans-serif" font-size="18" fill="#0f172a" font-weight="700" y="28">Three signals need your attention</text>
    </g>

    <!-- Divider -->
    <line x1="28" y1="92" x2="512" y2="92" stroke="#e2e8f0" stroke-width="1"/>

    <!-- Signal row 1: CRIT -->
    <g transform="translate(28, 112)">
      <circle cx="6" cy="10" r="5" fill="#ef4444"/>
      <text x="22" y="14" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#ef4444" font-weight="700" letter-spacing="0.1em">CRIT · CR-017</text>
      <text x="22" y="36" font-family="Inter, sans-serif" font-size="14" fill="#0f172a" font-weight="600">Cross-system correlation detected</text>
      <text x="22" y="56" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Vendor lapse + 3 doc requests queued</text>
    </g>

    <!-- Signal row 2: WARN -->
    <g transform="translate(28, 192)">
      <circle cx="6" cy="10" r="5" fill="#f59e0b"/>
      <text x="22" y="14" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#f59e0b" font-weight="700" letter-spacing="0.1em">WARN · REV-008</text>
      <text x="22" y="36" font-family="Inter, sans-serif" font-size="14" fill="#0f172a" font-weight="600">Revenue anomaly flagged</text>
      <text x="22" y="56" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Tuesday lunch down 18% vs trend</text>
    </g>

    <!-- Signal row 3: GOOD -->
    <g transform="translate(28, 272)">
      <circle cx="6" cy="10" r="5" fill="#10b981"/>
      <text x="22" y="14" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#10b981" font-weight="700" letter-spacing="0.1em">GOOD · MS-014</text>
      <text x="22" y="36" font-family="Inter, sans-serif" font-size="14" fill="#0f172a" font-weight="600">Milestone — fulfillment automated</text>
      <text x="22" y="56" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Core HOA reached 40 communities</text>
    </g>

    <!-- Card footer -->
    <line x1="28" y1="340" x2="512" y2="340" stroke="#e2e8f0" stroke-width="1"/>
    <g transform="translate(28, 358)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.08em">GENERATED BY XEEDLY AI · DELIVERED TO 12 RECIPIENTS</text>
    </g>
  </g>

  <!-- Footer mark -->
  <g transform="translate(80, 620)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text>
  </g>
  <g transform="translate(1120, 620)" text-anchor="end">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.08em">BRIEFING-001 · LIVE</text>
  </g>
</svg>
