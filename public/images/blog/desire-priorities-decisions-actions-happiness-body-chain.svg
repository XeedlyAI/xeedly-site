<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img"><title>The chain — forward and backward</title>
<defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern></defs>
<rect width="1200" height="675" fill="#0f172a"/><rect width="1200" height="675" fill="url(#g)"/>

<g transform="translate(80, 70)">
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">THE CHAIN · BOTH DIRECTIONS</text>
  <text font-family="Inter, sans-serif" font-size="22" fill="#f1f5f9" font-weight="700" y="32">Walk forward to design. Walk backward to diagnose.</text>
</g>

<!-- Forward direction (top) -->
<g transform="translate(100, 180)">
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" letter-spacing="0.15em" font-weight="700">FORWARD · DESIGN A LIFE</text>

  <g transform="translate(0, 30)" font-family="Inter, sans-serif" font-size="13" fill="#cbd5e1" font-weight="600">
    <g><rect width="160" height="80" rx="8" fill="#1e293b" stroke="#38b6ff"/><text x="80" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700" letter-spacing="0.1em">DESIRE</text><text x="80" y="52" text-anchor="middle">what you</text><text x="80" y="68" text-anchor="middle">want</text></g>
    <g transform="translate(160, 35)" stroke="#38b6ff" stroke-width="2" fill="none"><line x1="0" y1="6" x2="34" y2="6"/><polygon points="34,1 42,6 34,11" fill="#38b6ff"/></g>
    <g transform="translate(200, 0)"><rect width="160" height="80" rx="8" fill="#1e293b" stroke="#38b6ff"/><text x="80" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700" letter-spacing="0.1em">PRIORITIES</text><text x="80" y="52" text-anchor="middle">what ranks</text><text x="80" y="68" text-anchor="middle">first</text></g>
    <g transform="translate(360, 35)" stroke="#38b6ff" stroke-width="2" fill="none"><line x1="0" y1="6" x2="34" y2="6"/><polygon points="34,1 42,6 34,11" fill="#38b6ff"/></g>
    <g transform="translate(400, 0)"><rect width="160" height="80" rx="8" fill="#1e293b" stroke="#38b6ff"/><text x="80" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700" letter-spacing="0.1em">DECISIONS</text><text x="80" y="52" text-anchor="middle">what you</text><text x="80" y="68" text-anchor="middle">choose</text></g>
    <g transform="translate(560, 35)" stroke="#38b6ff" stroke-width="2" fill="none"><line x1="0" y1="6" x2="34" y2="6"/><polygon points="34,1 42,6 34,11" fill="#38b6ff"/></g>
    <g transform="translate(600, 0)"><rect width="160" height="80" rx="8" fill="#1e293b" stroke="#38b6ff"/><text x="80" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700" letter-spacing="0.1em">ACTIONS</text><text x="80" y="52" text-anchor="middle">what you</text><text x="80" y="68" text-anchor="middle">do</text></g>
    <g transform="translate(760, 35)" stroke="#38b6ff" stroke-width="2" fill="none"><line x1="0" y1="6" x2="34" y2="6"/><polygon points="34,1 42,6 34,11" fill="#38b6ff"/></g>
    <g transform="translate(800, 0)"><rect width="180" height="80" rx="8" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1.5"/><text x="90" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" font-weight="700" letter-spacing="0.1em">HAPPINESS</text><text x="90" y="52" text-anchor="middle">or its</text><text x="90" y="68" text-anchor="middle">absence</text></g>
  </g>
</g>

<!-- Divider -->
<line x1="80" y1="370" x2="1120" y2="370" stroke="#475569" stroke-width="1" stroke-dasharray="6 6"/>

<!-- Backward direction (bottom) -->
<g transform="translate(100, 410)">
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" letter-spacing="0.15em" font-weight="700">BACKWARD · DIAGNOSE MISALIGNMENT</text>

  <g transform="translate(0, 30)" font-family="Inter, sans-serif" font-size="13" fill="#cbd5e1">
    <g><rect width="180" height="80" rx="8" fill="#1e293b" stroke="#ef4444"/><text x="90" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700" letter-spacing="0.1em">UNHAPPY?</text><text x="90" y="56" text-anchor="middle" font-size="11">Look upstream</text></g>
    <g transform="translate(180, 35)" stroke="#ef4444" stroke-width="2" fill="none"><line x1="42" y1="6" x2="8" y2="6"/><polygon points="8,1 0,6 8,11" fill="#ef4444"/></g>
    <g transform="translate(220, 0)"><rect width="160" height="80" rx="8" fill="#1e293b" stroke="#ef4444"/><text x="80" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700">ACTIONS</text><text x="80" y="56" text-anchor="middle" font-size="11">wrong?</text></g>
    <g transform="translate(380, 35)" stroke="#ef4444" stroke-width="2" fill="none"><line x1="42" y1="6" x2="8" y2="6"/><polygon points="8,1 0,6 8,11" fill="#ef4444"/></g>
    <g transform="translate(420, 0)"><rect width="160" height="80" rx="8" fill="#1e293b" stroke="#ef4444"/><text x="80" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700">DECISIONS</text><text x="80" y="56" text-anchor="middle" font-size="11">misaligned?</text></g>
    <g transform="translate(580, 35)" stroke="#ef4444" stroke-width="2" fill="none"><line x1="42" y1="6" x2="8" y2="6"/><polygon points="8,1 0,6 8,11" fill="#ef4444"/></g>
    <g transform="translate(620, 0)"><rect width="160" height="80" rx="8" fill="#1e293b" stroke="#ef4444"/><text x="80" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700">PRIORITIES</text><text x="80" y="56" text-anchor="middle" font-size="11">corrupted?</text></g>
    <g transform="translate(780, 35)" stroke="#ef4444" stroke-width="2" fill="none"><line x1="42" y1="6" x2="8" y2="6"/><polygon points="8,1 0,6 8,11" fill="#ef4444"/></g>
    <g transform="translate(820, 0)"><rect width="160" height="80" rx="8" fill="#0f172a" stroke="#38b6ff" stroke-width="2"/><text x="80" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700">DESIRE</text><text x="80" y="56" text-anchor="middle" font-size="11" fill="#38b6ff">the real lever</text></g>
  </g>
</g>

<g transform="translate(80, 638)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">FIGURE 1 · THE CHAIN IN BOTH DIRECTIONS</text></g>
</svg>
