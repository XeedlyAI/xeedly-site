<g transform="translate(80, 360)" stroke="#475569" stroke-width="2"><line x1="484" y1="0" x2="484" y2="32"/><polygon points="480,28 484,40 488,28" fill="#475569"/></g>
<g transform="translate(380, 410)">
  <rect width="440" height="120" rx="10" fill="#0f172a" stroke="#38b6ff" stroke-width="2"/>
  <rect width="5" height="120" fill="#38b6ff"/>
  <g transform="translate(28, 32)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.1em">05 · INVESTOR DEALS ROOM</text>
    <text font-family="Inter, sans-serif" font-size="18" fill="#f1f5f9" font-weight="700" y="32">Each investor sees only what fits their lens</text>
    <text font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" y="58">Principal not required for routing · pipeline runs without bottleneck</text>
  </g>
</g>
<g transform="translate(80, 638)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">FIGURE 1 · PIPELINE INTELLIGENCE FLOW</text></g>
</svg>
