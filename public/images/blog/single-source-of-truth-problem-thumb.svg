<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img"><title>Single Source of Truth Problem</title>
<defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern></defs>
<rect width="1200" height="675" fill="#0f172a"/><rect width="1200" height="675" fill="url(#g)"/>
<g transform="translate(80, 80)">
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">MULTI-UNIT-OPS · #004</text>
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" y="24">MAGNETIZER · 7 MIN</text>
</g>
<!-- LEFT: 2-panel comparison -->
<g transform="translate(80, 200)">
  <!-- WRONG: CRM as source of truth -->
  <g>
    <rect width="540" height="170" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
    <rect width="5" height="170" fill="#ef4444"/>
    <g transform="translate(28, 28)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700" letter-spacing="0.12em">✗ CRM AS SOURCE OF TRUTH</text>
      <text font-family="Inter, sans-serif" font-size="15" fill="#cbd5e1" y="26">CRM as central, nightly syncs from everywhere</text>
      <text font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" y="56">→ Stale data, brittle integrations</text>
      <text font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" y="78">→ Wrong tool for cross-system signals</text>
      <text font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" y="100">→ Custom fields fighting CRM&apos;s data model</text>
    </g>
  </g>

  <!-- vs divider -->
  <g transform="translate(270, 200)" text-anchor="middle">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#475569" letter-spacing="0.2em" font-weight="700">VS</text>
  </g>

  <!-- RIGHT: Event bus -->
  <g transform="translate(0, 220)">
    <rect width="540" height="170" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <rect width="5" height="170" fill="#10b981"/>
    <g transform="translate(28, 28)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" font-weight="700" letter-spacing="0.12em">✓ EVENT BUS AS SOURCE OF TRUTH</text>
      <text font-family="Inter, sans-serif" font-size="15" fill="#cbd5e1" y="26">Real-time stream above all source systems</text>
      <text font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" y="56">→ Real-time, not nightly</text>
      <text font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" y="78">→ Source systems stay independent</text>
      <text font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" y="100">→ Cross-system correlation native</text>
    </g>
  </g>
</g>
<!-- RIGHT title -->
<g transform="translate(720, 260)">
  <text font-family="Inter, sans-serif" fill="#ffffff" font-weight="800" letter-spacing="-0.02em">
    <tspan x="0" y="0" font-size="46">Single</tspan>
    <tspan x="0" y="56" font-size="46">Source of</tspan>
    <tspan x="0" y="112" font-size="46" fill="#38b6ff">Truth.</tspan>
  </text>
  <text font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" y="158"><tspan x="0">Why CRMs can&apos;t be it.</tspan></text>
</g>
<g transform="translate(80, 620)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text></g>
<g transform="translate(1120, 620)" text-anchor="end"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.08em">BRIEFING #004 · LIVE</text></g>
</svg>
