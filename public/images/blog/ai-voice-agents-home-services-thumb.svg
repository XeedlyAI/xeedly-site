<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t14-title">
  <title id="t14-title">AI Voice Agents for Home Services — thumbnail</title>
  <defs><pattern id="t14-grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5" opacity="0.6"/></pattern></defs>
  <rect width="1200" height="675" fill="#FAFAFA"/><rect width="1200" height="675" fill="url(#t14-grid)"/>
  <g transform="translate(80, 80)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">MULTI-UNIT-OPS · HS-6</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" y="24">MAGNETIZER · 6 MIN</text>
  </g>

  <!-- LEFT: Big stat card with bar -->
  <g transform="translate(80, 200)">
    <rect x="3" y="3" width="540" height="380" rx="14" fill="#0f172a" opacity="0.05"/>
    <rect width="540" height="380" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="8" height="380" fill="#38b6ff"/>

    <g transform="translate(40, 56)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">MISSED CALL REVENUE LOSS</text>
    </g>

    <!-- Big hero number -->
    <g transform="translate(40, 170)">
      <text font-family="Inter, sans-serif" font-size="90" fill="#ef4444" font-weight="900" letter-spacing="-0.04em">30–40%</text>
    </g>

    <g transform="translate(40, 218)">
      <text font-family="Inter, sans-serif" font-size="18" fill="#0f172a" font-weight="700">of inbound calls go to</text>
      <text font-family="Inter, sans-serif" font-size="18" fill="#0f172a" font-weight="700" y="26">voicemail or hangup</text>
    </g>

    <line x1="40" y1="296" x2="500" y2="296" stroke="#e2e8f0"/>

    <g transform="translate(40, 322)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" font-weight="700">AI VOICE AGENT · $200–500 / MO</text>
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#10b981" letter-spacing="0.1em" font-weight="700" y="24">PAYS BACK IN FIRST MONTH</text>
