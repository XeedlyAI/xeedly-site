      <g transform="translate(0, 40)"><circle cx="6" cy="-3" r="5" fill="#10b981"/><text x="22" y="0" font-weight="600">Workers&apos; Compensation</text><text x="490" y="0" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">STATUTORY</text></g>
      <g transform="translate(0, 80)"><circle cx="6" cy="-3" r="5" fill="#10b981"/><text x="22" y="0" font-weight="600">Trade License</text><text x="490" y="0" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">CURRENT</text></g>
      <g transform="translate(0, 120)"><circle cx="6" cy="-3" r="5" fill="#10b981"/><text x="22" y="0" font-weight="600">W-9 (TIN on file)</text><text x="490" y="0" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">ON FILE</text></g>
