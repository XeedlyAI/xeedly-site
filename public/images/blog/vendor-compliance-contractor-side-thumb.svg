<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t13-title">
  <title id="t13-title">Vendor Compliance from the Contractor Side — thumbnail</title>
  <defs><pattern id="t13-grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern></defs>
  <rect width="1200" height="675" fill="#0f172a"/><rect width="1200" height="675" fill="url(#t13-grid)"/>
  <g transform="translate(80, 80)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">MULTI-UNIT-OPS · HS-5</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" y="24">COMPLETER · 6 MIN</text>
  </g>

  <!-- LEFT: Single 5-doc status card -->
  <g transform="translate(80, 200)">
    <rect x="3" y="3" width="540" height="380" rx="14" fill="#000" opacity="0.3"/>
    <rect width="540" height="380" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <rect width="8" height="380" fill="#10b981"/>

    <g transform="translate(40, 56)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#10b981" font-weight="700" letter-spacing="0.15em">VENDOR COMPLIANCE</text>
      <text font-family="Inter, sans-serif" font-size="26" fill="#f1f5f9" font-weight="800" y="40">What HOAs need to see</text>
    </g>

    <!-- 5 docs as big visual rows -->
    <g transform="translate(40, 154)" font-family="Inter, sans-serif" font-size="18" fill="#cbd5e1">
      <g><circle cx="10" cy="-6" r="9" fill="#10b981"/><text x="32" y="0" font-weight="600">General Liability</text></g>
      <g transform="translate(0, 36)"><circle cx="10" cy="-6" r="9" fill="#10b981"/><text x="32" y="0" font-weight="600">Workers&apos; Comp</text></g>
      <g transform="translate(0, 72)"><circle cx="10" cy="-6" r="9" fill="#10b981"/><text x="32" y="0" font-weight="600">Trade License</text></g>
      <g transform="translate(0, 108)"><circle cx="10" cy="-6" r="9" fill="#10b981"/><text x="32" y="0" font-weight="600">W-9</text></g>
      <g transform="translate(0, 144)"><circle cx="10" cy="-6" r="9" fill="#ef4444"/><text x="32" y="0" font-weight="600" fill="#ef4444">Commercial Auto</text><text x="460" y="0" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#ef4444" font-weight="700">EXPIRED</text></g>
    </g>
  </g>

  <!-- RIGHT: Big title -->
  <g transform="translate(720, 260)">
    <text font-family="Inter, sans-serif" fill="#ffffff" font-weight="800" letter-spacing="-0.02em">
      <tspan x="0" y="0" font-size="54">Vendor</tspan>
      <tspan x="0" y="64" font-size="54">Compliance.</tspan>
      <tspan x="0" y="124" font-size="42" fill="#10b981">Contractor side.</tspan>
    </text>
  </g>

  <g transform="translate(80, 620)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text></g>
  <g transform="translate(1120, 620)" text-anchor="end"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.08em">BRIEFING HS-5 · LIVE</text></g>
</svg>
