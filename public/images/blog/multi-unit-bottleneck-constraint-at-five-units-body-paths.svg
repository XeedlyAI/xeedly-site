<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="b5-title">
  <title id="b5-title">Decision routing paths — how the bottleneck multiplies</title>
  <defs>
    <pattern id="b5-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#0f172a"/>
  <rect width="1200" height="675" fill="url(#b5-grid)"/>

  <g transform="translate(80, 60)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">DECISION ROUTING · 3 SCENARIOS</text>
    <text font-family="Inter, sans-serif" font-size="22" fill="#f1f5f9" font-weight="700" y="32">How information paths multiply with scale</text>
  </g>

  <!-- 3 panels -->
  <!-- Panel 1: 4 units to leader -->
  <g transform="translate(80, 180)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" font-weight="700" letter-spacing="0.1em">4 UNITS · MANAGEABLE</text>
    <text font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" y="20">4 communication paths</text>

    <g transform="translate(0, 50)">
      <!-- Units -->
      <circle cx="0" cy="0" r="14" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/><text x="0" y="3" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#10b981">U1</text>
      <circle cx="0" cy="60" r="14" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/><text x="0" y="63" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#10b981">U2</text>
      <circle cx="0" cy="120" r="14" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/><text x="0" y="123" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#10b981">U3</text>
      <circle cx="0" cy="180" r="14" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/><text x="0" y="183" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#10b981">U4</text>

      <!-- Lines -->
      <g stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.6">
        <line x1="14" y1="0" x2="180" y2="90"/>
        <line x1="14" y1="60" x2="180" y2="90"/>
        <line x1="14" y1="120" x2="180" y2="90"/>
        <line x1="14" y1="180" x2="180" y2="90"/>
      </g>

      <!-- Leader -->
      <circle cx="200" cy="90" r="20" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
      <text x="200" y="93" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#10b981" font-weight="700">YOU</text>
    </g>
  </g>

  <!-- Panel 2: 10 units to leader (bottleneck) -->
  <g transform="translate(440, 180)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700" letter-spacing="0.1em">10 UNITS · BOTTLENECKED</text>
    <text font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" y="20">10 paths → all route to you</text>

    <g transform="translate(0, 50)">
      <!-- 10 units -->
      <circle cx="0" cy="0" r="11" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/><text x="0" y="3" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="8" fill="#ef4444">U1</text>
      <circle cx="0" cy="22" r="11" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/><text x="0" y="25" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="8" fill="#ef4444">U2</text>
      <circle cx="0" cy="44" r="11" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/><text x="0" y="47" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="8" fill="#ef4444">U3</text>
      <circle cx="0" cy="66" r="11" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/><text x="0" y="69" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="8" fill="#ef4444">U4</text>
      <circle cx="0" cy="88" r="11" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/><text x="0" y="91" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="8" fill="#ef4444">U5</text>
      <circle cx="0" cy="110" r="11" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/><text x="0" y="113" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="8" fill="#ef4444">U6</text>
      <circle cx="0" cy="132" r="11" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/><text x="0" y="135" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="8" fill="#ef4444">U7</text>
      <circle cx="0" cy="154" r="11" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/><text x="0" y="157" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="8" fill="#ef4444">U8</text>
      <circle cx="0" cy="176" r="11" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/><text x="0" y="179" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="8" fill="#ef4444">U9</text>
      <circle cx="0" cy="198" r="11" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/><text x="0" y="201" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="7" fill="#ef4444">U10</text>

      <g stroke="#ef4444" stroke-width="1.3" fill="none" opacity="0.6">
        <line x1="11" y1="0" x2="180" y2="99"/>
        <line x1="11" y1="22" x2="180" y2="99"/>
        <line x1="11" y1="44" x2="180" y2="99"/>
        <line x1="11" y1="66" x2="180" y2="99"/>
        <line x1="11" y1="88" x2="180" y2="99"/>
        <line x1="11" y1="110" x2="180" y2="99"/>
        <line x1="11" y1="132" x2="180" y2="99"/>
        <line x1="11" y1="154" x2="180" y2="99"/>
        <line x1="11" y1="176" x2="180" y2="99"/>
        <line x1="11" y1="198" x2="180" y2="99"/>
      </g>

      <circle cx="200" cy="99" r="22" fill="#0f172a" stroke="#ef4444" stroke-width="2.5"/>
      <text x="200" y="103" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#ef4444" font-weight="700">YOU</text>
    </g>
  </g>

  <!-- Panel 3: 10 units with intelligence layer -->
  <g transform="translate(800, 180)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700" letter-spacing="0.1em">10 UNITS + INTELLIGENCE LAYER</text>
    <text font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" y="20">Exceptions only → low load</text>

    <g transform="translate(0, 50)">
      <!-- 10 units -->
      <g>
        <circle cx="0" cy="0" r="11" fill="#1e293b" stroke="#38b6ff" stroke-width="1.5"/>
        <circle cx="0" cy="22" r="11" fill="#1e293b" stroke="#38b6ff" stroke-width="1.5"/>
        <circle cx="0" cy="44" r="11" fill="#1e293b" stroke="#38b6ff" stroke-width="1.5"/>
        <circle cx="0" cy="66" r="11" fill="#1e293b" stroke="#38b6ff" stroke-width="1.5"/>
        <circle cx="0" cy="88" r="11" fill="#1e293b" stroke="#38b6ff" stroke-width="1.5"/>
        <circle cx="0" cy="110" r="11" fill="#1e293b" stroke="#38b6ff" stroke-width="1.5"/>
        <circle cx="0" cy="132" r="11" fill="#1e293b" stroke="#38b6ff" stroke-width="1.5"/>
        <circle cx="0" cy="154" r="11" fill="#1e293b" stroke="#38b6ff" stroke-width="1.5"/>
        <circle cx="0" cy="176" r="11" fill="#1e293b" stroke="#38b6ff" stroke-width="1.5"/>
        <circle cx="0" cy="198" r="11" fill="#1e293b" stroke="#38b6ff" stroke-width="1.5"/>
      </g>

      <!-- All flow to intelligence layer -->
      <g stroke="#38b6ff" stroke-width="1.3" fill="none" opacity="0.5">
        <line x1="11" y1="0" x2="100" y2="99"/>
        <line x1="11" y1="22" x2="100" y2="99"/>
        <line x1="11" y1="44" x2="100" y2="99"/>
        <line x1="11" y1="66" x2="100" y2="99"/>
        <line x1="11" y1="88" x2="100" y2="99"/>
        <line x1="11" y1="110" x2="100" y2="99"/>
        <line x1="11" y1="132" x2="100" y2="99"/>
        <line x1="11" y1="154" x2="100" y2="99"/>
        <line x1="11" y1="176" x2="100" y2="99"/>
        <line x1="11" y1="198" x2="100" y2="99"/>
      </g>

      <!-- Intelligence layer -->
      <rect x="80" y="80" width="80" height="38" rx="6" fill="#1e293b" stroke="#38b6ff" stroke-width="1.5"/>
      <text x="120" y="98" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#38b6ff" font-weight="700" letter-spacing="0.1em">SIGNAL</text>
      <text x="120" y="112" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#38b6ff" font-weight="700" letter-spacing="0.1em">ENGINE</text>

      <!-- Single line out -->
      <line x1="160" y1="99" x2="220" y2="99" stroke="#38b6ff" stroke-width="2" stroke-dasharray="3 3"/>

      <!-- Leader -->
      <circle cx="240" cy="99" r="20" fill="#1e293b" stroke="#38b6ff" stroke-width="2"/>
      <text x="240" y="102" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#38b6ff" font-weight="700">YOU</text>
    </g>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(80, 540)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.1em">RESULT</text>
    <text font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" y="22">Adding headcount adds paths. Adding intelligence collapses them — exceptions only.</text>
  </g>

  <g transform="translate(80, 640)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">FIGURE 1 · DECISION ROUTING PATHS</text>
  </g>
</svg>
