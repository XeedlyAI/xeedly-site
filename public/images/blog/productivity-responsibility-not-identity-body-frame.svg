<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img"><title>Identity vs responsibility framings</title>
<defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern></defs>
<rect width="1200" height="675" fill="#0f172a"/><rect width="1200" height="675" fill="url(#g)"/>
<g transform="translate(80, 70)">
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">TWO FRAMINGS · ONE CHOICE</text>
  <text font-family="Inter, sans-serif" font-size="22" fill="#f1f5f9" font-weight="700" y="32">Productivity as identity vs productivity as responsibility</text>
</g>
<g transform="translate(80, 180)">
  <!-- IDENTITY -->
  <g>
    <rect width="520" height="380" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
    <rect width="6" height="380" fill="#ef4444"/>
    <g transform="translate(28, 32)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700" letter-spacing="0.15em">PRODUCTIVITY = IDENTITY</text>
      <text font-family="Inter, sans-serif" font-size="20" fill="#f1f5f9" font-weight="700" y="32">Fragile · who you are = what you produce</text>
    </g>
    <line x1="28" y1="96" x2="492" y2="96" stroke="#334155"/>
    <g transform="translate(28, 120)" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1">
      <text font-weight="600">Failure modes:</text>
      <g transform="translate(0, 30)"><circle cx="6" cy="-4" r="4" fill="#ef4444"/><text x="22" y="0">Can&apos;t rest — resting feels like being nobody</text></g>
      <g transform="translate(0, 58)"><circle cx="6" cy="-4" r="4" fill="#ef4444"/><text x="22" y="0">Can&apos;t fail — every setback is a self-attack</text></g>
      <g transform="translate(0, 86)"><circle cx="6" cy="-4" r="4" fill="#ef4444"/><text x="22" y="0">Can&apos;t be present — relationships atrophy</text></g>
      <g transform="translate(0, 114)"><circle cx="6" cy="-4" r="4" fill="#ef4444"/><text x="22" y="0">Identity crisis on the other side of success</text></g>
    </g>
  </g>

  <!-- RESPONSIBILITY -->
  <g transform="translate(560, 0)">
    <rect width="480" height="380" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <rect width="6" height="380" fill="#10b981"/>
    <g transform="translate(28, 32)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" font-weight="700" letter-spacing="0.15em">PRODUCTIVITY = RESPONSIBILITY</text>
      <text font-family="Inter, sans-serif" font-size="20" fill="#f1f5f9" font-weight="700" y="32">Durable · what you owe ≠ who you are</text>
    </g>
    <line x1="28" y1="96" x2="452" y2="96" stroke="#334155"/>
    <g transform="translate(28, 120)" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1">
      <text font-weight="600">Strengths:</text>
      <g transform="translate(0, 30)"><circle cx="6" cy="-4" r="4" fill="#10b981"/><text x="22" y="0">Rest is allowed — identity intact</text></g>
      <g transform="translate(0, 58)"><circle cx="6" cy="-4" r="4" fill="#10b981"/><text x="22" y="0">Failure is a project event, not self-event</text></g>
      <g transform="translate(0, 86)"><circle cx="6" cy="-4" r="4" fill="#10b981"/><text x="22" y="0">Presence without producing is meaningful</text></g>
      <g transform="translate(0, 114)"><circle cx="6" cy="-4" r="4" fill="#10b981"/><text x="22" y="0">Self survives bad quarters and exits</text></g>
    </g>
  </g>
</g>
<g transform="translate(80, 638)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">FIGURE 1 · IDENTITY VS RESPONSIBILITY FRAMINGS</text></g>
</svg>
