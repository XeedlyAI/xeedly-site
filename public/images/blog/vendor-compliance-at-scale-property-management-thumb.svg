    </g>

    <!-- Legend on right side -->
    <g transform="translate(290, 116)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#64748b" letter-spacing="0.1em" y="0">LIVE STATUS</text>

      <g transform="translate(0, 24)">
        <circle cx="8" cy="8" r="6" fill="#10b981"/>
        <text x="24" y="12" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#f1f5f9" font-weight="600">52 current</text>
      </g>
      <g transform="translate(0, 50)">
        <circle cx="8" cy="8" r="6" fill="#f59e0b"/>
        <text x="24" y="12" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#f1f5f9" font-weight="600">8 expiring &lt;30d</text>
      </g>
      <g transform="translate(0, 76)">
        <circle cx="8" cy="8" r="6" fill="#ef4444"/>
        <text x="24" y="12" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700">4 LAPSED</text>
      </g>

      <g transform="translate(0, 120)">
        <rect width="240" height="36" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
        <text x="12" y="22" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#ef4444" font-weight="700" letter-spacing="0.08em">LIABILITY EXPOSURE: ACTIVE</text>
      </g>

      <g transform="translate(0, 168)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">200–400 documents</text>
        <text y="16" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">in active rotation</text>
        <text y="32" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">across vendor pool</text>
      </g>
    </g>
  </g>

  <!-- Right title -->
  <g transform="translate(740, 200)">
    <text font-family="Inter, sans-serif" fill="#ffffff" font-weight="800" letter-spacing="-0.02em">
      <tspan x="0" y="0" font-size="38">Vendor</tspan>
      <tspan x="0" y="46" font-size="38">Compliance</tspan>
      <tspan x="0" y="92" font-size="38" fill="#ef4444">at Scale.</tspan>
    </text>
    <text font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" letter-spacing="0" y="130">
      <tspan x="0">The quiet liability in</tspan>
      <tspan x="0" y="150">property management.</tspan>
    </text>
  </g>

  <g transform="translate(80, 620)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text>
  </g>
  <g transform="translate(1120, 620)" text-anchor="end">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.08em">BRIEFING-008 · LIVE</text>
  </g>
</svg>
