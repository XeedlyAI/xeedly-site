<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t8-title">
  <title id="t8-title">Vendor Compliance at Scale — thumbnail</title>
  <defs>
    <pattern id="t8-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Dark navy -->
  <rect width="1200" height="675" fill="#0f172a"/>
  <rect width="1200" height="675" fill="url(#t8-grid)"/>

  <g transform="translate(80, 80)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">MULTI-UNIT-OPS · #008</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#64748b" letter-spacing="0.1em" y="22">MAGNETIZER · 7 MIN</text>
  </g>

  <!-- DOMINANT ELEMENT: Compliance scorecard with vendor grid -->
  <g transform="translate(80, 180)">
    <rect x="2" y="2" width="600" height="400" rx="10" fill="#000" opacity="0.3"/>
    <rect width="600" height="400" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect width="5" height="400" fill="#ef4444"/>

    <g transform="translate(28, 32)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700" letter-spacing="0.12em">VENDOR COMPLIANCE · LIVE STATUS</text>
      <text font-family="Inter, sans-serif" font-size="18" fill="#f1f5f9" font-weight="700" y="28">52 of 64 vendors current</text>
    </g>

    <line x1="28" y1="92" x2="572" y2="92" stroke="#334155" stroke-width="1"/>

    <!-- Vendor grid 8×6 with severity dots -->
    <g transform="translate(28, 116)">
      <!-- Row labels -->
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#64748b" letter-spacing="0.1em" y="0">VENDOR POOL · 64 ACTIVE</text>

      <!-- Grid of 64 dots, 8 columns × 8 rows -->
      <g transform="translate(0, 16)">
        <!-- Row 1 - all good -->
        <circle cx="10" cy="10" r="6" fill="#10b981"/>
        <circle cx="40" cy="10" r="6" fill="#10b981"/>
        <circle cx="70" cy="10" r="6" fill="#10b981"/>
        <circle cx="100" cy="10" r="6" fill="#10b981"/>
        <circle cx="130" cy="10" r="6" fill="#10b981"/>
        <circle cx="160" cy="10" r="6" fill="#10b981"/>
        <circle cx="190" cy="10" r="6" fill="#10b981"/>
        <circle cx="220" cy="10" r="6" fill="#10b981"/>
        <!-- Row 2 - mostly good, one warn -->
        <circle cx="10" cy="40" r="6" fill="#10b981"/>
        <circle cx="40" cy="40" r="6" fill="#10b981"/>
        <circle cx="70" cy="40" r="6" fill="#10b981"/>
        <circle cx="100" cy="40" r="6" fill="#f59e0b"/>
        <circle cx="130" cy="40" r="6" fill="#10b981"/>
        <circle cx="160" cy="40" r="6" fill="#10b981"/>
        <circle cx="190" cy="40" r="6" fill="#10b981"/>
        <circle cx="220" cy="40" r="6" fill="#10b981"/>
        <!-- Row 3 -->
        <circle cx="10" cy="70" r="6" fill="#10b981"/>
        <circle cx="40" cy="70" r="6" fill="#10b981"/>
        <circle cx="70" cy="70" r="6" fill="#ef4444"/>
        <circle cx="100" cy="70" r="6" fill="#10b981"/>
        <circle cx="130" cy="70" r="6" fill="#10b981"/>
        <circle cx="160" cy="70" r="6" fill="#10b981"/>
        <circle cx="190" cy="70" r="6" fill="#10b981"/>
        <circle cx="220" cy="70" r="6" fill="#f59e0b"/>
        <!-- Row 4 -->
        <circle cx="10" cy="100" r="6" fill="#10b981"/>
        <circle cx="40" cy="100" r="6" fill="#10b981"/>
        <circle cx="70" cy="100" r="6" fill="#10b981"/>
        <circle cx="100" cy="100" r="6" fill="#10b981"/>
        <circle cx="130" cy="100" r="6" fill="#10b981"/>
        <circle cx="160" cy="100" r="6" fill="#f59e0b"/>
        <circle cx="190" cy="100" r="6" fill="#10b981"/>
        <circle cx="220" cy="100" r="6" fill="#10b981"/>
        <!-- Row 5 -->
        <circle cx="10" cy="130" r="6" fill="#ef4444"/>
        <circle cx="40" cy="130" r="6" fill="#10b981"/>
        <circle cx="70" cy="130" r="6" fill="#10b981"/>
        <circle cx="100" cy="130" r="6" fill="#10b981"/>
        <circle cx="130" cy="130" r="6" fill="#10b981"/>
        <circle cx="160" cy="130" r="6" fill="#10b981"/>
        <circle cx="190" cy="130" r="6" fill="#f59e0b"/>
        <circle cx="220" cy="130" r="6" fill="#10b981"/>
        <!-- Row 6 -->
        <circle cx="10" cy="160" r="6" fill="#10b981"/>
        <circle cx="40" cy="160" r="6" fill="#10b981"/>
        <circle cx="70" cy="160" r="6" fill="#10b981"/>
        <circle cx="100" cy="160" r="6" fill="#10b981"/>
        <circle cx="130" cy="160" r="6" fill="#ef4444"/>
        <circle cx="160" cy="160" r="6" fill="#10b981"/>
        <circle cx="190" cy="160" r="6" fill="#10b981"/>
        <circle cx="220" cy="160" r="6" fill="#10b981"/>
        <!-- Row 7 -->
        <circle cx="10" cy="190" r="6" fill="#10b981"/>
        <circle cx="40" cy="190" r="6" fill="#f59e0b"/>
        <circle cx="70" cy="190" r="6" fill="#10b981"/>
        <circle cx="100" cy="190" r="6" fill="#10b981"/>
        <circle cx="130" cy="190" r="6" fill="#10b981"/>
        <circle cx="160" cy="190" r="6" fill="#10b981"/>
        <circle cx="190" cy="190" r="6" fill="#10b981"/>
        <circle cx="220" cy="190" r="6" fill="#10b981"/>
        <!-- Row 8 -->
        <circle cx="10" cy="220" r="6" fill="#10b981"/>
        <circle cx="40" cy="220" r="6" fill="#10b981"/>
        <circle cx="70" cy="220" r="6" fill="#10b981"/>
        <circle cx="100" cy="220" r="6" fill="#10b981"/>
        <circle cx="130" cy="220" r="6" fill="#10b981"/>
        <circle cx="160" cy="220" r="6" fill="#10b981"/>
        <circle cx="190" cy="220" r="6" fill="#10b981"/>
        <circle cx="220" cy="220" r="6" fill="#10b981"/>
