<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t10-title">
  <title id="t10-title">How to Get on an HOA Preferred Vendor List — thumbnail</title>
  <defs><pattern id="t10-grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern></defs>
  <rect width="1200" height="675" fill="#0f172a"/><rect width="1200" height="675" fill="url(#t10-grid)"/>
  <g transform="translate(80, 80)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">MULTI-UNIT-OPS · HS-2</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" y="24">HIGH-INTENT COMMERCIAL · 8 MIN</text>
  </g>

  <!-- LEFT: Single comparison card -->
  <g transform="translate(80, 200)">
    <rect x="3" y="3" width="540" height="380" rx="14" fill="#000" opacity="0.3"/>
    <rect width="540" height="380" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <rect width="8" height="380" fill="#10b981"/>

    <g transform="translate(40, 56)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#10b981" font-weight="700" letter-spacing="0.15em">HOA PREFERRED VENDOR ACCESS</text>
      <text font-family="Inter, sans-serif" font-size="26" fill="#f1f5f9" font-weight="800" y="40">The highest-margin channel</text>
    </g>

    <!-- Big advantages list -->
    <g transform="translate(40, 162)" font-family="Inter, sans-serif" font-size="20" fill="#cbd5e1" font-weight="600">
      <g><text x="0" y="0" font-size="22" fill="#10b981">✓</text><text x="32" y="0">Recurring work</text></g>
      <g transform="translate(0, 40)"><text x="0" y="0" font-size="22" fill="#10b981">✓</text><text x="32" y="0">Larger tickets</text></g>
      <g transform="translate(0, 80)"><text x="0" y="0" font-size="22" fill="#10b981">✓</text><text x="32" y="0">Net-30 commercial terms</text></g>
      <g transform="translate(0, 120)"><text x="0" y="0" font-size="22" fill="#10b981">✓</text><text x="32" y="0">Low customer acquisition cost</text></g>
    </g>
  </g>

  <!-- RIGHT: Big title -->
  <g transform="translate(720, 220)">
    <text font-family="Inter, sans-serif" fill="#ffffff" font-weight="800" letter-spacing="-0.02em">
      <tspan x="0" y="0" font-size="48">Get on an</tspan>
      <tspan x="0" y="58" font-size="48">HOA</tspan>
      <tspan x="0" y="116" font-size="48" fill="#10b981">Preferred</tspan>
      <tspan x="0" y="174" font-size="48" fill="#10b981">Vendor List.</tspan>
    </text>
  </g>

  <g transform="translate(80, 620)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text></g>
  <g transform="translate(1120, 620)" text-anchor="end"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.08em">BRIEFING HS-2 · LIVE</text></g>
</svg>
