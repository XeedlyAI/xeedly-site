<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t10-title">
  <title id="t10-title">How to Get on an HOA Preferred Vendor List — thumbnail</title>
  <defs>
    <pattern id="t10-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#0f172a"/>
  <rect width="1200" height="675" fill="url(#t10-grid)"/>

  <g transform="translate(80, 80)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">MULTI-UNIT-OPS · HS-2</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#64748b" letter-spacing="0.1em" y="22">HIGH-INTENT COMMERCIAL · 8 MIN</text>
  </g>

  <!-- Comparison card: residential vs HOA -->
  <g transform="translate(80, 180)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.12em">CHANNEL COMPARISON</text>

    <!-- Residential -->
    <g transform="translate(0, 24)">
      <rect width="320" height="80" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
      <rect width="4" height="80" fill="#94a3b8"/>
      <text x="18" y="24" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" font-weight="700" letter-spacing="0.1em">RESIDENTIAL LEADS</text>
      <text x="18" y="48" font-family="Inter, sans-serif" font-size="14" fill="#f1f5f9" font-weight="600">$80–$150 / lead · 20–30% close</text>
      <text x="18" y="68" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">ONE-OFF · CONSUMER · NET-NOW</text>
    </g>

    <text x="160" y="124" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#475569" letter-spacing="0.15em" font-weight="600">VS</text>

    <!-- HOA Preferred -->
    <g transform="translate(0, 140)">
      <rect width="320" height="80" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
      <rect width="4" height="80" fill="#10b981"/>
      <text x="18" y="24" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" font-weight="700" letter-spacing="0.1em">HOA PREFERRED VENDOR</text>
      <text x="18" y="48" font-family="Inter, sans-serif" font-size="14" fill="#f1f5f9" font-weight="600">Recurring · Larger tickets · Net-30</text>
      <text x="18" y="68" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#10b981">RELATIONSHIP · COMMERCIAL · STEADY</text>
    </g>

    <!-- Steps card -->
    <g transform="translate(0, 248)">
      <rect width="320" height="120" rx="8" fill="#1e293b" stroke="#38b6ff" stroke-width="1.5"/>
      <rect width="4" height="120" fill="#38b6ff"/>
      <text x="18" y="24" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700" letter-spacing="0.1em">HOW TO GET IN · 3 STEPS</text>
      <text x="18" y="46" font-family="Inter, sans-serif" font-size="12" fill="#cbd5e1">01 · Compliance current and organized</text>
      <text x="18" y="68" font-family="Inter, sans-serif" font-size="12" fill="#cbd5e1">02 · Verified HOA/multi-unit work history</text>
      <text x="18" y="90" font-family="Inter, sans-serif" font-size="12" fill="#cbd5e1">03 · Marketplace presence + direct outreach</text>
    </g>
  </g>

  <g transform="translate(480, 220)">
    <text font-family="Inter, sans-serif" fill="#ffffff" font-weight="800" letter-spacing="-0.02em">
      <tspan x="0" y="0" font-size="40">Get on an</tspan>
      <tspan x="0" y="48" font-size="40">HOA</tspan>
      <tspan x="0" y="96" font-size="40" fill="#10b981">Preferred</tspan>
      <tspan x="0" y="144" font-size="40" fill="#10b981">Vendor List.</tspan>
    </text>
    <text font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" y="178">
      <tspan x="0">The highest-margin channel</tspan>
      <tspan x="0" y="196">for home services in 2026.</tspan>
    </text>
  </g>

  <g transform="translate(80, 620)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text></g>
  <g transform="translate(1120, 620)" text-anchor="end"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.08em">BRIEFING HS-2 · LIVE</text></g>
</svg>
