<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="b8-title">
  <title id="b8-title">The compliance matrix grows multiplicatively</title>
  <defs>
    <pattern id="b8-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#0f172a"/>
  <rect width="1200" height="675" fill="url(#b8-grid)"/>

  <g transform="translate(80, 60)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">COMPLIANCE COMBINATORIAL COMPLEXITY</text>
    <text font-family="Inter, sans-serif" font-size="22" fill="#f1f5f9" font-weight="700" y="32">64 vendors × 5 document types = 320 things to track</text>
  </g>

  <!-- Matrix visualization -->
  <g transform="translate(100, 170)">
    <!-- Column labels (document types) -->
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.08em" font-weight="600">
      <text x="180" y="0" text-anchor="middle">GL INS</text>
      <text x="320" y="0" text-anchor="middle">WC INS</text>
      <text x="460" y="0" text-anchor="middle">LICENSE</text>
      <text x="600" y="0" text-anchor="middle">W-9</text>
      <text x="740" y="0" text-anchor="middle">AUTO</text>
    </g>

    <!-- Row labels (vendors) -->
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.08em" font-weight="600">
      <text x="40" y="38" text-anchor="end">PLUMB-001</text>
      <text x="40" y="74" text-anchor="end">HVAC-002</text>
      <text x="40" y="110" text-anchor="end">ELEC-003</text>
      <text x="40" y="146" text-anchor="end">LAWN-004</text>
      <text x="40" y="182" text-anchor="end">PAINT-005</text>
      <text x="40" y="218" text-anchor="end">ROOF-006</text>
      <text x="40" y="254" text-anchor="end">POOL-007</text>
      <text x="40" y="290" text-anchor="end">FENCE-008</text>
      <text x="40" y="326" text-anchor="end">PEST-009</text>
      <text x="40" y="362" text-anchor="end">CLEAN-010</text>
      <text x="40" y="398" text-anchor="end">... 54 more</text>
    </g>

    <!-- Matrix cells (10 rows × 5 cols visible, last row is "..." -->
    <g>
      <!-- Each cell is 60w × 26h, gap 10 -->
      <!-- Generate cells with mostly green (good), some amber (expiring), some red (lapsed) -->
      <!-- Row 1 PLUMB-001 -->
      <rect x="150" y="20" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="290" y="20" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="430" y="20" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="570" y="20" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="710" y="20" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <!-- Row 2 HVAC-002 -->
      <rect x="150" y="56" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="290" y="56" width="60" height="26" rx="3" fill="#f59e0b"/>
      <rect x="430" y="56" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="570" y="56" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="710" y="56" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <!-- Row 3 ELEC-003 -->
      <rect x="150" y="92" width="60" height="26" rx="3" fill="#ef4444"/>
      <rect x="290" y="92" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="430" y="92" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="570" y="92" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="710" y="92" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <!-- Row 4 LAWN-004 -->
      <rect x="150" y="128" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="290" y="128" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="430" y="128" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="570" y="128" width="60" height="26" rx="3" fill="#f59e0b"/>
      <rect x="710" y="128" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <!-- Row 5 PAINT-005 -->
      <rect x="150" y="164" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="290" y="164" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="430" y="164" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="570" y="164" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="710" y="164" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <!-- Row 6 ROOF-006 -->
      <rect x="150" y="200" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="290" y="200" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="430" y="200" width="60" height="26" rx="3" fill="#ef4444"/>
      <rect x="570" y="200" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="710" y="200" width="60" height="26" rx="3" fill="#f59e0b"/>
      <!-- Row 7 POOL-007 -->
      <rect x="150" y="236" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="290" y="236" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="430" y="236" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="570" y="236" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="710" y="236" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <!-- Row 8 FENCE-008 -->
      <rect x="150" y="272" width="60" height="26" rx="3" fill="#f59e0b"/>
      <rect x="290" y="272" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="430" y="272" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="570" y="272" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="710" y="272" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <!-- Row 9 PEST-009 -->
      <rect x="150" y="308" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="290" y="308" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="430" y="308" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="570" y="308" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="710" y="308" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <!-- Row 10 CLEAN-010 -->
      <rect x="150" y="344" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="290" y="344" width="60" height="26" rx="3" fill="#ef4444"/>
      <rect x="430" y="344" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="570" y="344" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="710" y="344" width="60" height="26" rx="3" fill="#10b981" opacity="0.7"/>
      <!-- ... more row -->
      <rect x="150" y="380" width="620" height="26" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="460" y="397" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#64748b" letter-spacing="0.08em">270 MORE CELLS · MANUAL SPREADSHEET FAILS HERE</text>
    </g>

    <!-- Legend -->
    <g transform="translate(820, 40)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.1em" font-weight="700">STATUS</text>

      <g transform="translate(0, 22)">
        <rect width="20" height="14" rx="2" fill="#10b981" opacity="0.7"/>
        <text x="28" y="11" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">Current</text>
      </g>
      <g transform="translate(0, 46)">
        <rect width="20" height="14" rx="2" fill="#f59e0b"/>
        <text x="28" y="11" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">Expiring &lt;30d</text>
      </g>
      <g transform="translate(0, 70)">
        <rect width="20" height="14" rx="2" fill="#ef4444"/>
        <text x="28" y="11" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700">LAPSED</text>
      </g>

      <g transform="translate(0, 114)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">320 cells</text>
        <text y="16" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">~$5K per lapsed</text>
        <text y="32" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#ef4444">liability exposure</text>
      </g>

      <g transform="translate(0, 200)">
        <rect width="140" height="40" rx="6" fill="#0f172a" stroke="#38b6ff" stroke-width="1.5"/>
        <text x="70" y="18" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#38b6ff" font-weight="700" letter-spacing="0.08em">PROPERTYJOBZ</text>
        <text x="70" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#94a3b8">tracks all cells</text>
      </g>
    </g>
  </g>

  <g transform="translate(80, 640)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">FIGURE 1 · COMPLIANCE MATRIX</text>
  </g>
</svg>
