<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="b3-title">
  <title id="b3-title">Five-question test for owner dependency</title>
  <defs>
    <pattern id="b3-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#0f172a"/>
  <rect width="1200" height="675" fill="url(#b3-grid)"/>

  <g transform="translate(80, 70)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">THE 5-QUESTION TEST · OWNER DEPENDENCY</text>
    <text font-family="Inter, sans-serif" font-size="22" fill="#f1f5f9" font-weight="700" y="32">Are you the bottleneck in your own success?</text>
  </g>

  <!-- 5 question rows -->
  <g transform="translate(80, 170)">
    <!-- Q1 -->
    <g>
      <rect width="1040" height="80" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <rect width="5" height="80" fill="#38b6ff"/>
      <g transform="translate(24, 28)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.1em">01</text>
        <text x="56" y="0" font-family="Inter, sans-serif" font-size="16" fill="#f1f5f9" font-weight="600">What percentage of your inbox is decisions others could make with the right information?</text>
        <text x="56" y="22" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">HEALTHY: &lt; 20%</text>
      </g>
    </g>

    <!-- Q2 -->
    <g transform="translate(0, 96)">
      <rect width="1040" height="80" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <rect width="5" height="80" fill="#38b6ff"/>
      <g transform="translate(24, 28)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.1em">02</text>
        <text x="56" y="0" font-family="Inter, sans-serif" font-size="16" fill="#f1f5f9" font-weight="600">When you&apos;re out a week, what waits for you vs. what gets made without you?</text>
        <text x="56" y="22" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">HEALTHY: ROUTINE FLOWS · ONLY STRATEGIC WAITS</text>
      </g>
    </g>

    <!-- Q3 -->
    <g transform="translate(0, 192)">
      <rect width="1040" height="80" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <rect width="5" height="80" fill="#38b6ff"/>
      <g transform="translate(24, 28)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.1em">03</text>
        <text x="56" y="0" font-family="Inter, sans-serif" font-size="16" fill="#f1f5f9" font-weight="600">Could your quality standards survive without you for 3 months — or are they in your head?</text>
        <text x="56" y="22" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">HEALTHY: WRITTEN INTO THE SYSTEM</text>
      </g>
    </g>

    <!-- Q4 -->
    <g transform="translate(0, 288)">
      <rect width="1040" height="80" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <rect width="5" height="80" fill="#38b6ff"/>
      <g transform="translate(24, 28)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.1em">04</text>
        <text x="56" y="0" font-family="Inter, sans-serif" font-size="16" fill="#f1f5f9" font-weight="600">When was your last full day on long-range strategy without operational interruption?</text>
        <text x="56" y="22" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">HEALTHY: WITHIN THE LAST 30 DAYS</text>
      </g>
    </g>

    <!-- Q5 -->
    <g transform="translate(0, 384)">
      <rect width="1040" height="80" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <rect width="5" height="80" fill="#38b6ff"/>
      <g transform="translate(24, 28)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.1em">05</text>
        <text x="56" y="0" font-family="Inter, sans-serif" font-size="16" fill="#f1f5f9" font-weight="600">If your business doubled next year, would you become more or less of the bottleneck?</text>
        <text x="56" y="22" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">HEALTHY: LESS · ARCHITECTURE SCALES WITHOUT YOU</text>
      </g>
    </g>
  </g>

  <g transform="translate(80, 640)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">FIGURE 1 · OWNER DEPENDENCY DIAGNOSTIC</text>
  </g>
</svg>
