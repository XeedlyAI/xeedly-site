<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="b2-title">
  <title id="b2-title">Where document revenue flows in each model</title>
  <defs>
    <pattern id="b2-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#0f172a"/>
  <rect width="1200" height="675" fill="url(#b2-grid)"/>

  <g transform="translate(80, 70)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">REVENUE FLOW · 40-COMMUNITY MANAGEMENT CO</text>
    <text font-family="Inter, sans-serif" font-size="22" fill="#f1f5f9" font-weight="700" y="32">$90,000 annual document revenue · two paths</text>
  </g>

  <!-- LEFT: Third-party model -->
  <g transform="translate(80, 180)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700" letter-spacing="0.12em">CURRENT · THIRD-PARTY MODEL</text>

    <!-- Flow -->
    <g transform="translate(0, 30)">
      <!-- Your team -->
      <rect width="180" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="90" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#f1f5f9" font-weight="600">Your team works</text>
      <text x="90" y="46" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">DATA · VERIFICATION</text>

      <!-- Arrow -->
      <g transform="translate(180, 30)">
        <line x1="0" y1="0" x2="40" y2="0" stroke="#475569" stroke-width="2"/>
        <polygon points="40,-5 48,0 40,5" fill="#475569"/>
      </g>

      <!-- 3rd party portal -->
      <g transform="translate(228, 0)">
        <rect width="180" height="60" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
        <rect width="4" height="60" fill="#ef4444"/>
        <text x="92" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#f1f5f9" font-weight="600">3rd party portal</text>
        <text x="92" y="46" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#fca5a5">FULFILLMENT · BILLING</text>
      </g>

      <!-- Arrow -->
      <g transform="translate(408, 30)">
        <line x1="0" y1="0" x2="40" y2="0" stroke="#475569" stroke-width="2"/>
        <polygon points="40,-5 48,0 40,5" fill="#475569"/>
      </g>

      <!-- Revenue split -->
      <g transform="translate(456, 0)">
        <!-- Their cut -->
        <rect width="80" height="60" rx="4" fill="#ef4444" opacity="0.7"/>
        <text x="40" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#ffffff" font-weight="800">$72K</text>
        <text x="40" y="46" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#fff" letter-spacing="0.08em">THEIRS</text>
      </g>
      <g transform="translate(540, 0)">
        <!-- Your cut -->
        <rect width="60" height="60" rx="4" fill="#10b981" opacity="0.5"/>
        <text x="30" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#ffffff" font-weight="800">$18K</text>
        <text x="30" y="46" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#fff" letter-spacing="0.08em">YOURS</text>
      </g>
    </g>

    <g transform="translate(0, 130)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.08em">ANNUAL CAPTURE · ~$18K (estimated back-end split)</text>
    </g>
  </g>

  <!-- Divider -->
  <line x1="80" y1="380" x2="1120" y2="380" stroke="#334155" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- RIGHT: In-house model -->
  <g transform="translate(80, 420)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" font-weight="700" letter-spacing="0.12em">IN-HOUSE · PROPERTYDOCZ MODEL</text>

    <g transform="translate(0, 30)">
      <!-- Your team -->
      <rect width="180" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="90" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#f1f5f9" font-weight="600">Your team works</text>
      <text x="90" y="46" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">DATA · VERIFICATION</text>

      <g transform="translate(180, 30)">
        <line x1="0" y1="0" x2="40" y2="0" stroke="#475569" stroke-width="2"/>
        <polygon points="40,-5 48,0 40,5" fill="#475569"/>
      </g>

      <!-- Your portal -->
      <g transform="translate(228, 0)">
        <rect width="180" height="60" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
        <rect width="4" height="60" fill="#10b981"/>
        <text x="92" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#f1f5f9" font-weight="600">docs.you.com</text>
        <text x="92" y="46" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#86efac">AI-ASSISTED · STRIPE</text>
      </g>

      <g transform="translate(408, 30)">
        <line x1="0" y1="0" x2="40" y2="0" stroke="#475569" stroke-width="2"/>
        <polygon points="40,-5 48,0 40,5" fill="#475569"/>
      </g>

      <!-- All to you -->
      <g transform="translate(456, 0)">
        <rect width="144" height="60" rx="4" fill="#10b981"/>
        <text x="72" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" fill="#ffffff" font-weight="800">$90K</text>
        <text x="72" y="46" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#fff" letter-spacing="0.08em">YOURS · ALL OF IT</text>
      </g>
    </g>

    <g transform="translate(0, 130)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" letter-spacing="0.08em">ANNUAL CAPTURE · $90K · 5× INCREASE</text>
    </g>
  </g>

  <g transform="translate(80, 638)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">FIGURE 1 · DOCUMENT REVENUE FLOW</text>
  </g>
</svg>
