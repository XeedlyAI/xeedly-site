<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img"><title>Business Signals</title>
<defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern></defs>
<rect width="1200" height="675" fill="#0f172a"/><rect width="1200" height="675" fill="url(#g)"/>
<g transform="translate(80, 80)">
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">PRINCIPAL-INTELLIGENCE · #008</text>
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" y="24">MAGNETIZER · 6 MIN</text>
</g>
<!-- LEFT: Big stat card -->
<g transform="translate(80, 200)">
  <rect x="3" y="3" width="540" height="380" rx="14" fill="#000" opacity="0.3"/>
  <rect width="540" height="380" rx="14" fill="#1e293b" stroke="#38b6ff" stroke-width="1.5"/>
  <rect width="8" height="380" fill="#38b6ff"/>
  <g transform="translate(40, 56)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">SIGNALS PER DAY · TYPICAL OPS BUSINESS</text>
  </g>
  <g transform="translate(40, 180)">
    <text font-family="Inter, sans-serif" font-size="110" fill="#ffffff" font-weight="900" letter-spacing="-0.04em">1,500+</text>
  </g>
  <g transform="translate(40, 226)">
    <text font-family="Inter, sans-serif" font-size="20" fill="#cbd5e1" font-weight="700">events captured daily</text>
    <text font-family="Inter, sans-serif" font-size="20" fill="#ef4444" font-weight="700" y="28">~99% never reach the leader</text>
  </g>
  <line x1="40" y1="296" x2="500" y2="296" stroke="#334155"/>
  <g transform="translate(40, 322)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#94a3b8" letter-spacing="0.1em" font-weight="700">SCATTERED · SILENT · BURIED IN NOISE</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#10b981" letter-spacing="0.1em" font-weight="700" y="24">FIX = SIGNAL DETECTION LAYER</text>
  </g>
</g>
<g transform="translate(720, 260)">
  <text font-family="Inter, sans-serif" fill="#ffffff" font-weight="800" letter-spacing="-0.02em">
    <tspan x="0" y="0" font-size="48">Thousands of</tspan>
    <tspan x="0" y="58" font-size="48">Signals.</tspan>
    <tspan x="0" y="124" font-size="40" fill="#ef4444">Missing most.</tspan>
  </text>
</g>
<g transform="translate(80, 620)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text></g>
<g transform="translate(1120, 620)" text-anchor="end"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.08em">BRIEFING #008 · LIVE</text></g>
</svg>
