<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t2-title">
  <title id="t2-title">HOA Document Revenue — Briefing thumbnail</title>
  <defs>
    <pattern id="t2-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="t2-glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="#0f172a"/>
  <rect width="1200" height="675" fill="url(#t2-grid)"/>
  <ellipse cx="600" cy="340" rx="500" ry="280" fill="url(#t2-glow)"/>

  <g transform="translate(80, 80)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">MULTI-UNIT-OPS · #002</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#64748b" letter-spacing="0.1em" y="22">HIGH-INTENT COMMERCIAL · 8 MIN</text>
  </g>

  <!-- DOMINANT ELEMENT: Revenue calculator scorecard -->
  <g transform="translate(80, 180)">
    <rect x="2" y="2" width="640" height="380" rx="10" fill="#000" opacity="0.3"/>
    <rect width="640" height="380" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <rect width="5" height="380" fill="#10b981"/>

    <g transform="translate(28, 32)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" font-weight="700" letter-spacing="0.12em">REVENUE OPPORTUNITY · 40 COMMUNITIES</text>
      <text font-family="Inter, sans-serif" font-size="20" fill="#f1f5f9" font-weight="700" y="32">$90,000 / year, currently elsewhere</text>
    </g>

    <line x1="28" y1="100" x2="612" y2="100" stroke="#334155" stroke-width="1"/>

    <!-- Three KPI tiles -->
    <g transform="translate(28, 124)">
      <rect width="180" height="100" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="16" y="22" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.1em">TRANSACTIONS / YR</text>
      <text x="16" y="56" font-family="Inter, sans-serif" font-size="32" fill="#10b981" font-weight="800">400</text>
      <text x="16" y="80" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#64748b">8–12 PER COMMUNITY</text>
    </g>

    <g transform="translate(228, 124)">
      <rect width="180" height="100" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="16" y="22" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.1em">AVG FEE / PKG</text>
      <text x="16" y="56" font-family="Inter, sans-serif" font-size="32" fill="#38b6ff" font-weight="800">$225</text>
      <text x="16" y="80" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#64748b">$150–$350 RANGE</text>
    </g>

    <g transform="translate(428, 124)">
      <rect width="184" height="100" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
      <text x="16" y="22" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#10b981" letter-spacing="0.1em">ANNUAL REVENUE</text>
      <text x="16" y="56" font-family="Inter, sans-serif" font-size="30" fill="#f1f5f9" font-weight="800">$90K</text>
      <text x="16" y="80" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#10b981">CURRENTLY → 3RD PARTY</text>
    </g>

    <!-- Arrow indicator -->
    <g transform="translate(28, 248)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.1em">CURRENT FLOW</text>
      <g transform="translate(0, 16)">
        <rect width="180" height="40" rx="20" fill="#0f172a" stroke="#475569" stroke-width="1"/>
        <text x="90" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">Your team works</text>
      </g>
      <g transform="translate(200, 32)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#475569">
        <text>→</text>
      </g>
      <g transform="translate(230, 16)">
        <rect width="180" height="40" rx="20" fill="#0f172a" stroke="#475569" stroke-width="1"/>
        <text x="90" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">3rd party portal</text>
      </g>
      <g transform="translate(430, 32)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#475569">
        <text>→</text>
      </g>
      <g transform="translate(460, 16)">
        <rect width="152" height="40" rx="20" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
        <text x="76" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#10b981" font-weight="600">Their revenue</text>
      </g>
    </g>

    <line x1="28" y1="320" x2="612" y2="320" stroke="#334155" stroke-width="1"/>
    <g transform="translate(28, 344)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.08em">PROPERTYDOCZ · BRINGS THE PIPELINE IN-HOUSE</text>
    </g>
  </g>

  <!-- Right side title -->
  <g transform="translate(770, 200)">
    <text font-family="Inter, sans-serif" fill="#ffffff" font-weight="800" letter-spacing="-0.02em">
      <tspan x="0" y="0" font-size="40">HOA</tspan>
      <tspan x="0" y="48" font-size="40">Document</tspan>
      <tspan x="0" y="96" font-size="40" fill="#10b981">Revenue</tspan>
    </text>
    <text font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" letter-spacing="0" y="136">
      <tspan x="0">What most management</tspan>
      <tspan x="0" y="156">companies lose to</tspan>
      <tspan x="0" y="176">third parties.</tspan>
    </text>
  </g>

  <g transform="translate(80, 620)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text>
  </g>
  <g transform="translate(1120, 620)" text-anchor="end">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.08em">BRIEFING-002 · LIVE</text>
  </g>
</svg>
