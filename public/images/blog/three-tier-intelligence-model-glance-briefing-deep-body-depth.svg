<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="b4-title">
  <title id="b4-title">Time-budget alignment for each depth</title>
  <defs>
    <pattern id="b4-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#0f172a"/>
  <rect width="1200" height="675" fill="url(#b4-grid)"/>

  <g transform="translate(80, 70)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">TIME BUDGET BY DEPTH</text>
    <text font-family="Inter, sans-serif" font-size="22" fill="#f1f5f9" font-weight="700" y="32">Where each tier earns its keep</text>
  </g>

  <!-- Timeline axis -->
  <g transform="translate(140, 240)">
    <line x1="0" y1="200" x2="980" y2="200" stroke="#475569" stroke-width="1.5"/>
    <!-- Tick marks -->
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#64748b" letter-spacing="0.05em">
      <line x1="0" y1="195" x2="0" y2="205" stroke="#475569" stroke-width="1.5"/>
      <text x="0" y="222" text-anchor="middle">0s</text>
      <line x1="160" y1="195" x2="160" y2="205" stroke="#475569" stroke-width="1.5"/>
      <text x="160" y="222" text-anchor="middle">5s</text>
      <line x1="490" y1="195" x2="490" y2="205" stroke="#475569" stroke-width="1.5"/>
      <text x="490" y="222" text-anchor="middle">60s</text>
      <line x1="980" y1="195" x2="980" y2="205" stroke="#475569" stroke-width="1.5"/>
      <text x="980" y="222" text-anchor="middle">5min</text>
    </g>

    <!-- Tier bands -->
    <!-- GLANCE band -->
    <g>
      <rect x="0" y="40" width="160" height="160" rx="6" fill="#14B8A6" opacity="0.12"/>
      <rect x="0" y="40" width="4" height="160" fill="#14B8A6"/>
      <text x="80" y="80" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#14B8A6" font-weight="700" letter-spacing="0.1em">GLANCE</text>
      <text x="80" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#f1f5f9" font-weight="600">Ambient</text>
      <text x="80" y="125" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">KPI TICKER</text>
      <text x="80" y="166" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">EVERY SCREEN</text>
      <text x="80" y="182" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">REAL-TIME</text>
    </g>
    <!-- BRIEFING band -->
    <g transform="translate(160, 0)">
      <rect x="0" y="20" width="330" height="180" rx="6" fill="#38b6ff" opacity="0.12"/>
      <rect x="0" y="20" width="4" height="180" fill="#38b6ff"/>
      <text x="165" y="60" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.1em">BRIEFING</text>
      <text x="165" y="85" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#f1f5f9" font-weight="600">Proactive</text>
      <text x="165" y="105" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">AI MORNING BRIEFING</text>
      <text x="165" y="146" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">EMAIL · SMS · SLACK</text>
      <text x="165" y="162" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">CATEGORIZED</text>
      <text x="165" y="178" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">PRIORITIZED</text>
    </g>
    <!-- DEEP band -->
    <g transform="translate(490, 0)">
      <rect x="0" y="0" width="490" height="200" rx="6" fill="#8B5CF6" opacity="0.12"/>
      <rect x="0" y="0" width="4" height="200" fill="#8B5CF6"/>
      <text x="245" y="40" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#8B5CF6" font-weight="700" letter-spacing="0.1em">DEEP</text>
      <text x="245" y="65" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#f1f5f9" font-weight="600">Investigative</text>
      <text x="245" y="85" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">SIGNAL FEED · AI CONCIERGE</text>
      <text x="245" y="124" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">ENTITY DRILLDOWNS</text>
      <text x="245" y="140" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">FREEFORM QUERIES</text>
      <text x="245" y="156" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">CROSS-SYSTEM CORRELATION</text>
    </g>
  </g>

  <!-- Bottom: where each tier should NOT be used -->
  <g transform="translate(140, 540)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700" letter-spacing="0.1em">FAILURE MODE</text>
    <text font-family="Inter, sans-serif" font-size="13" fill="#cbd5e1" y="20">Build only at DEEP (most BI tools) → nobody has 5 minutes/hour. Dashboard collects dust.</text>
    <text font-family="Inter, sans-serif" font-size="13" fill="#cbd5e1" y="40">Build only at GLANCE (alert systems) → too shallow to investigate. Notifications go unactioned.</text>
  </g>

  <g transform="translate(80, 640)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">FIGURE 1 · THE THREE-TIER MODEL</text>
  </g>
</svg>
