<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t16-title">
  <title id="t16-title">The Contractor's Operating Stack — thumbnail</title>
  <defs><pattern id="t16-grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M 48 0 L 0 0 0 48" fill="none" stroke="#e7e1d6" stroke-width="0.5" opacity="0.6"/></pattern></defs>
  <rect width="1200" height="675" fill="#FAF7F2"/><rect width="1200" height="675" fill="url(#t16-grid)"/>
  <g transform="translate(80, 80)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">MULTI-UNIT-OPS · HS-8</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" y="24">COMPLETER · 7 MIN</text>
  </g>

  <!-- LEFT: Simplified 5-layer stack — just labels, no descriptions -->
  <g transform="translate(80, 200)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#94a3b8" letter-spacing="0.15em" font-weight="700">THE 5-LAYER STACK</text>

    <!-- Stack layers (just labels, bigger fonts) -->
    <g transform="translate(0, 32)">
      <rect width="540" height="58" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <rect width="8" height="58" fill="#14b8a6"/>
      <text x="32" y="36" font-family="Inter, sans-serif" font-size="22" fill="#0f172a" font-weight="700">Field Service CRM</text>
    </g>
    <g transform="translate(0, 100)">
      <rect width="540" height="58" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <rect width="8" height="58" fill="#38b6ff"/>
      <text x="32" y="36" font-family="Inter, sans-serif" font-size="22" fill="#0f172a" font-weight="700">Accounting</text>
    </g>
    <g transform="translate(0, 168)">
      <rect width="540" height="58" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <rect width="8" height="58" fill="#8b5cf6"/>
      <text x="32" y="36" font-family="Inter, sans-serif" font-size="22" fill="#0f172a" font-weight="700">Payments</text>
    </g>
    <g transform="translate(0, 236)">
      <rect width="540" height="58" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <rect width="8" height="58" fill="#f59e0b"/>
      <text x="32" y="36" font-family="Inter, sans-serif" font-size="22" fill="#0f172a" font-weight="700">AI Voice Agent</text>
    </g>
    <g transform="translate(0, 304)">
      <rect width="540" height="58" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <rect width="8" height="58" fill="#10b981"/>
      <text x="32" y="36" font-family="Inter, sans-serif" font-size="22" fill="#0f172a" font-weight="700">Vendor Marketplace</text>
    </g>
  </g>

  <!-- RIGHT: Big title + tagline -->
  <g transform="translate(720, 260)">
    <text font-family="Inter, sans-serif" fill="#0f172a" font-weight="800" letter-spacing="-0.02em">
      <tspan x="0" y="0" font-size="48">The</tspan>
      <tspan x="0" y="58" font-size="48">Contractor&apos;s</tspan>
      <tspan x="0" y="116" font-size="48" fill="#38b6ff">Operating</tspan>
      <tspan x="0" y="174" font-size="48" fill="#38b6ff">Stack.</tspan>
    </text>
  </g>

  <g transform="translate(80, 620)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text></g>
  <g transform="translate(1120, 620)" text-anchor="end"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.08em">BRIEFING HS-8 · LIVE</text></g>
</svg>
