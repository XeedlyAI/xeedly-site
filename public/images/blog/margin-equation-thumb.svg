    <text font-family="Inter, sans-serif" font-size="20" fill="#0f172a" font-weight="800" y="34">Real wealth × all four</text>
  </g>
  <line x1="36" y1="96" x2="504" y2="96" stroke="#e2e8f0"/>
  <g transform="translate(36, 124)" font-family="Inter, sans-serif" font-size="16" fill="#334155">
    <g><circle cx="8" cy="-5" r="6" fill="#10b981"/><text x="28" y="0" font-weight="700">Financial margin</text><text x="468" y="0" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">$$ per $</text></g>
    <g transform="translate(0, 40)"><circle cx="8" cy="-5" r="6" fill="#38b6ff"/><text x="28" y="0" font-weight="700">Calendar margin</text><text x="468" y="0" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">unstructured hours</text></g>
    <g transform="translate(0, 80)"><circle cx="8" cy="-5" r="6" fill="#8b5cf6"/><text x="28" y="0" font-weight="700">Attention margin</text><text x="468" y="0" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">mental headroom</text></g>
    <g transform="translate(0, 120)"><circle cx="8" cy="-5" r="6" fill="#f59e0b"/><text x="28" y="0" font-weight="700">Presence margin</text><text x="468" y="0" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">being where you are</text></g>
  </g>
  <line x1="36" y1="316" x2="504" y2="316" stroke="#e2e8f0"/>
  <g transform="translate(36, 340)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.1em" font-weight="700">MOST LEADERS MAX 1 · LET 3 GO TO ZERO</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#10b981" letter-spacing="0.1em" font-weight="700" y="22">ARCHITECTURE = ALL FOUR COMPOUND</text>
  </g>
</g>
<g transform="translate(720, 250)">
  <text font-family="Inter, sans-serif" fill="#0f172a" font-weight="800" letter-spacing="-0.02em">
    <tspan x="0" y="0" font-size="46">The Margin</tspan>
    <tspan x="0" y="56" font-size="46" fill="#38b6ff">Equation.</tspan>
  </text>
  <text font-family="Inter, sans-serif" font-size="14" fill="#64748b"><tspan x="0" y="102">Calendar · attention ·</tspan><tspan x="0" y="122">presence · financial.</tspan></text>
</g>
<g transform="translate(80, 620)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text></g>
<g transform="translate(1120, 620)" text-anchor="end"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.08em">BRIEFING #008 · LIVE</text></g>
