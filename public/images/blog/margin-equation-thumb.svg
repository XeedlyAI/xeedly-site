<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img"><title>The Margin Equation</title>
<defs><pattern id="g" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M 48 0 L 0 0 0 48" fill="none" stroke="#e7e1d6" stroke-width="0.5" opacity="0.6"/></pattern></defs>
<rect width="1200" height="675" fill="#FAF7F2"/><rect width="1200" height="675" fill="url(#g)"/>
<g transform="translate(80, 80)">
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">PRINCIPAL-LIFE · #008</text>
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" y="24">COMPLETER · 6 MIN</text>
</g>
<!-- LEFT: 4 margin cards -->
<g transform="translate(80, 200)">
  <rect x="3" y="3" width="540" height="380" rx="14" fill="#0f172a" opacity="0.05"/>
  <rect width="540" height="380" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <rect width="8" height="380" fill="#38b6ff"/>
  <g transform="translate(36, 32)">
