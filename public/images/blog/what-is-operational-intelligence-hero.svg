<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 686" width="1600" height="686" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="hero-title">
  <title id="hero-title">What Is Operational Intelligence — Hero</title>
  <defs>
    <pattern id="hero-grid-light" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#bae6fd" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <radialGradient id="hero-glow-light" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#38b6ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F0F9FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Pale blue wash background -->
  <rect width="1600" height="686" fill="#F0F9FF"/>
  <rect width="1600" height="686" fill="url(#hero-grid-light)"/>
  <ellipse cx="800" cy="280" rx="700" ry="280" fill="url(#hero-glow-light)"/>

  <!-- LEFT: pipeline diagram -->
  <g transform="translate(120, 160)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.15em" font-weight="600">SIGNAL PIPELINE</text>

    <!-- INGEST -->
    <g transform="translate(0, 30)">
      <rect x="2" y="2" width="200" height="96" rx="8" fill="#0f172a" opacity="0.05"/>
      <rect width="200" height="96" rx="8" fill="#ffffff" stroke="#14B8A6" stroke-width="2"/>
      <rect x="0" y="0" width="5" height="96" fill="#14B8A6"/>
      <text x="20" y="34" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#0F766E" font-weight="700" letter-spacing="0.1em">INGEST</text>
      <text x="20" y="58" font-family="Inter, sans-serif" font-size="14" fill="#0f172a" font-weight="600">Event bus</text>
      <text x="20" y="82" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#64748b" letter-spacing="0.06em">12,847 EVENTS / HOUR</text>
    </g>

    <!-- arrow -->
    <g transform="translate(200, 60)">
      <line x1="0" y1="18" x2="56" y2="18" stroke="#38b6ff" stroke-width="2"/>
      <polygon points="56,12 64,18 56,24" fill="#38b6ff"/>
    </g>

    <!-- DETECT -->
    <g transform="translate(264, 30)">
      <rect x="2" y="2" width="200" height="96" rx="8" fill="#0f172a" opacity="0.05"/>
      <rect width="200" height="96" rx="8" fill="#ffffff" stroke="#38b6ff" stroke-width="2"/>
      <rect x="0" y="0" width="5" height="96" fill="#38b6ff"/>
      <text x="20" y="34" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#0A8FD4" font-weight="700" letter-spacing="0.1em">DETECT</text>
      <text x="20" y="58" font-family="Inter, sans-serif" font-size="14" fill="#0f172a" font-weight="600">Signal engine</text>
      <text x="20" y="82" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#64748b" letter-spacing="0.06em">37 ACTIVE RULES</text>
    </g>

    <g transform="translate(464, 60)">
      <line x1="0" y1="18" x2="56" y2="18" stroke="#38b6ff" stroke-width="2"/>
      <polygon points="56,12 64,18 56,24" fill="#38b6ff"/>
    </g>

    <!-- DELIVER -->
    <g transform="translate(528, 30)">
      <rect x="2" y="2" width="200" height="96" rx="8" fill="#0f172a" opacity="0.05"/>
      <rect width="200" height="96" rx="8" fill="#ffffff" stroke="#8B5CF6" stroke-width="2"/>
      <rect x="0" y="0" width="5" height="96" fill="#8B5CF6"/>
      <text x="20" y="34" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#7C3AED" font-weight="700" letter-spacing="0.1em">DELIVER</text>
      <text x="20" y="58" font-family="Inter, sans-serif" font-size="14" fill="#0f172a" font-weight="600">Multi-channel</text>
      <text x="20" y="82" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#64748b" letter-spacing="0.06em">EMAIL · SMS · SLACK</text>
    </g>
  </g>

  <!-- Sample signal cards -->
  <g transform="translate(120, 320)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.15em" font-weight="600">SAMPLE SIGNALS</text>

    <g transform="translate(0, 24)">
      <rect x="2" y="2" width="340" height="80" rx="8" fill="#0f172a" opacity="0.04"/>
      <rect width="340" height="80" rx="8" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
      <rect width="5" height="80" fill="#EF4444"/>
      <text x="20" y="24" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#DC2626" font-weight="700" letter-spacing="0.1em">HIGH · CR-017</text>
      <text x="20" y="48" font-family="Inter, sans-serif" font-size="14" fill="#0f172a" font-weight="600">Cross-system correlation detected</text>
      <text x="20" y="68" font-family="Inter, sans-serif" font-size="12" fill="#475569">Vendor insurance lapsed + 3 doc requests queued</text>
    </g>

    <g transform="translate(360, 24)">
      <rect x="2" y="2" width="340" height="80" rx="8" fill="#0f172a" opacity="0.04"/>
      <rect width="340" height="80" rx="8" fill="#ffffff" stroke="#fed7aa" stroke-width="1"/>
      <rect width="5" height="80" fill="#F59E0B"/>
      <text x="20" y="24" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#D97706" font-weight="700" letter-spacing="0.1em">MEDIUM · REV-008</text>
      <text x="20" y="48" font-family="Inter, sans-serif" font-size="14" fill="#0f172a" font-weight="600">Revenue anomaly flagged</text>
      <text x="20" y="68" font-family="Inter, sans-serif" font-size="12" fill="#475569">Tuesday lunch down 18% vs 4-wk trend</text>
    </g>
  </g>

  <!-- RIGHT: Title block -->
  <g transform="translate(900, 180)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#0A8FD4" font-weight="700" letter-spacing="0.15em">PRINCIPAL-INTELLIGENCE · #001</text>

    <text font-family="Inter, sans-serif" font-weight="800" letter-spacing="-0.02em">
      <tspan x="0" y="62" font-size="56" fill="#0f172a">What Is</tspan>
      <tspan x="0" y="124" font-size="56" fill="#0f172a">Operational</tspan>
      <tspan x="0" y="186" font-size="56" fill="#38b6ff">Intelligence?</tspan>
    </text>

    <text font-family="Inter, sans-serif" font-size="17" fill="#475569" letter-spacing="0">
      <tspan x="0" y="234">And why dashboards don&apos;t deliver it.</tspan>
    </text>

    <g transform="translate(0, 264)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#64748b" letter-spacing="0.08em">— SHAD · FOUNDER · 7 MIN READ</text>
    </g>
  </g>

  <!-- Footer mark -->
  <g transform="translate(120, 636)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text>
  </g>
  <g transform="translate(1480, 636)" text-anchor="end">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.08em">SIGNAL-001 · LIVE</text>
  </g>
</svg>
