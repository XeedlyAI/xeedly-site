<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t9-title">
  <title id="t9-title">The Multi-Truck Operations Trap — thumbnail</title>
  <defs><pattern id="t9-grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M 48 0 L 0 0 0 48" fill="none" stroke="#e2e8f0" stroke-width="0.5" opacity="0.6"/></pattern></defs>
  <rect width="1200" height="675" fill="#FAFAFA"/><rect width="1200" height="675" fill="url(#t9-grid)"/>
  <g transform="translate(80, 80)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">MULTI-UNIT-OPS · HS-1</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" y="24">FRONT-DOOR · HOME SERVICES · 8 MIN</text>
  </g>

  <!-- LEFT: Single hero number card -->
  <g transform="translate(80, 200)">
    <rect x="3" y="3" width="540" height="380" rx="14" fill="#0f172a" opacity="0.05"/>
    <rect width="540" height="380" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="8" height="380" fill="#ef4444"/>

    <g transform="translate(40, 56)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#ef4444" font-weight="700" letter-spacing="0.15em">THE BREAKING POINT</text>
    </g>

    <!-- Big hero number with truck count -->
    <g transform="translate(40, 200)">
      <text font-family="Inter, sans-serif" font-size="150" fill="#ef4444" font-weight="900" letter-spacing="-0.04em">3→6</text>
      <text font-family="Inter, sans-serif" font-size="22" fill="#64748b" font-weight="600" y="34">trucks</text>
    </g>

    <g transform="translate(40, 274)">
      <text font-family="Inter, sans-serif" font-size="20" fill="#0f172a" font-weight="700">Where owner becomes</text>
      <text font-family="Inter, sans-serif" font-size="20" fill="#0f172a" font-weight="700" y="28">the bottleneck</text>
    </g>

    <line x1="40" y1="320" x2="500" y2="320" stroke="#e2e8f0"/>

    <g transform="translate(40, 346)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" font-weight="700">FIX IS ARCHITECTURAL · NOT HEADCOUNT</text>
    </g>
  </g>

  <!-- RIGHT: Big title -->
  <g transform="translate(720, 230)">
    <text font-family="Inter, sans-serif" fill="#0f172a" font-weight="800" letter-spacing="-0.02em">
      <tspan x="0" y="0" font-size="52">The Multi-</tspan>
      <tspan x="0" y="62" font-size="52">Truck</tspan>
      <tspan x="0" y="148" font-size="52" fill="#ef4444">Trap.</tspan>
    </text>
    <text font-family="Inter, sans-serif" font-size="15" fill="#64748b" y="190">
      <tspan x="0">Why scaling past 3 crews</tspan>
      <tspan x="0" y="22">breaks everything.</tspan>
    </text>
  </g>

  <g transform="translate(80, 620)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text></g>
  <g transform="translate(1120, 620)" text-anchor="end"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.08em">BRIEFING HS-1 · LIVE</text></g>
</svg>
