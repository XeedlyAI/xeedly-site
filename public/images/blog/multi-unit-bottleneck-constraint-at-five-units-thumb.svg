<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t5-title">
  <title id="t5-title">The Multi-Unit Bottleneck — thumbnail</title>
  <defs>
    <pattern id="t5-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5" opacity="0.6"/>
    </pattern>
  </defs>

  <!-- Off-white -->
  <rect width="1200" height="675" fill="#FAFAFA"/>
  <rect width="1200" height="675" fill="url(#t5-grid)"/>

  <g transform="translate(80, 80)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">MULTI-UNIT-OPS · #005</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#64748b" letter-spacing="0.1em" y="22">FRONT-DOOR · 7 MIN</text>
  </g>

  <!-- DOMINANT ELEMENT: Bottleneck visualization — many lines converging to one node -->
  <g transform="translate(120, 200)">
    <!-- Many unit nodes feeding into one principal node -->
    <!-- 10 unit nodes on left -->
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#64748b" letter-spacing="0.08em">
      <circle cx="0" cy="0" r="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="0" y="3" text-anchor="middle">U1</text>
      <circle cx="0" cy="36" r="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="0" y="39" text-anchor="middle">U2</text>
      <circle cx="0" cy="72" r="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="0" y="75" text-anchor="middle">U3</text>
      <circle cx="0" cy="108" r="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="0" y="111" text-anchor="middle">U4</text>
      <circle cx="0" cy="144" r="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="0" y="147" text-anchor="middle">U5</text>
      <circle cx="0" cy="180" r="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="0" y="183" text-anchor="middle">U6</text>
      <circle cx="0" cy="216" r="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="0" y="219" text-anchor="middle">U7</text>
      <circle cx="0" cy="252" r="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="0" y="255" text-anchor="middle">U8</text>
      <circle cx="0" cy="288" r="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="0" y="291" text-anchor="middle">U9</text>
      <circle cx="0" cy="324" r="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="0" y="327" text-anchor="middle">U10</text>
    </g>

    <!-- Lines converging to one node -->
    <g stroke="#ef4444" stroke-width="1.5" fill="none" opacity="0.7">
      <line x1="14" y1="0" x2="300" y2="162"/>
      <line x1="14" y1="36" x2="300" y2="162"/>
      <line x1="14" y1="72" x2="300" y2="162"/>
      <line x1="14" y1="108" x2="300" y2="162"/>
      <line x1="14" y1="144" x2="300" y2="162"/>
      <line x1="14" y1="180" x2="300" y2="162"/>
      <line x1="14" y1="216" x2="300" y2="162"/>
      <line x1="14" y1="252" x2="300" y2="162"/>
      <line x1="14" y1="288" x2="300" y2="162"/>
      <line x1="14" y1="324" x2="300" y2="162"/>
    </g>

    <!-- Principal bottleneck node -->
    <g transform="translate(300, 162)">
      <circle r="36" fill="#0f172a" stroke="#ef4444" stroke-width="2.5"/>
      <text y="-2" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700" letter-spacing="0.1em">YOU</text>
      <text y="14" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#94a3b8">BOTTLENECK</text>
    </g>

    <!-- Single line out -->
    <line x1="336" y1="162" x2="420" y2="162" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
    <g transform="translate(434, 154)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#64748b" letter-spacing="0.08em">STRATEGY (paused)</text>
    </g>
  </g>

  <!-- Right side title -->
  <g transform="translate(680, 240)">
    <text font-family="Inter, sans-serif" fill="#0f172a" font-weight="800" letter-spacing="-0.02em">
      <tspan x="0" y="0" font-size="38">The Multi-Unit</tspan>
      <tspan x="0" y="46" font-size="38" fill="#ef4444">Bottleneck.</tspan>
    </text>
    <text font-family="Inter, sans-serif" font-size="14" fill="#475569" letter-spacing="0" y="84">
      <tspan x="0">Why you become the constraint</tspan>
      <tspan x="0" y="104">at 5+ units. And why adding</tspan>
      <tspan x="0" y="124">headcount makes it worse.</tspan>
    </text>
  </g>

  <g transform="translate(80, 620)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text>
  </g>
  <g transform="translate(1120, 620)" text-anchor="end">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.08em">BRIEFING-005 · LIVE</text>
  </g>
</svg>
