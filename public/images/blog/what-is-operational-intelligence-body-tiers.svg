<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="body-tiers-title">
  <title id="body-tiers-title">The three depths of intelligence — Glance, Briefing, Deep</title>
  <defs>
    <pattern id="body-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="body-glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#38b6ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Dark background (variety vs the light thumbnail) -->
  <rect width="1200" height="675" fill="#0f172a"/>
  <rect width="1200" height="675" fill="url(#body-grid)"/>
  <ellipse cx="600" cy="338" rx="500" ry="280" fill="url(#body-glow)"/>

  <!-- Header strip -->
  <g transform="translate(80, 80)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">THE THREE DEPTHS OF INTELLIGENCE</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#64748b" letter-spacing="0.1em" y="22">GLANCE · BRIEFING · DEEP — A LEADER&apos;S TIME BUDGET</text>
  </g>

  <!-- Three depth cards laid horizontally -->
  <g transform="translate(80, 200)">
    <!-- GLANCE -->
    <g>
      <rect width="340" height="320" rx="8" fill="#1e293b" stroke="#14b8a6" stroke-width="1.5"/>
      <rect width="5" height="320" fill="#14b8a6"/>
      <g transform="translate(28, 32)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#14b8a6" font-weight="700" letter-spacing="0.12em">GLANCE</text>
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" y="22" letter-spacing="0.1em">0–5 SECONDS</text>

        <text font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" y="64" font-weight="600">KPI ticker</text>
        <text font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" y="86">Ambient awareness layer.</text>
        <text font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" y="104">Always visible.</text>
        <text font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" y="122">No clicks. No logins.</text>

        <!-- Example KPI strip -->
        <g transform="translate(0, 156)">
          <rect width="280" height="40" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
          <text x="14" y="18" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#14b8a6" letter-spacing="0.1em">REVENUE</text>
          <text x="14" y="32" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#f1f5f9" font-weight="700">$847</text>
          <text x="80" y="18" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#14b8a6" letter-spacing="0.1em">OPEN</text>
          <text x="80" y="32" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#f1f5f9" font-weight="700">12</text>
          <text x="140" y="18" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#14b8a6" letter-spacing="0.1em">VENDORS</text>
          <text x="140" y="32" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#f1f5f9" font-weight="700">92%</text>
          <text x="220" y="18" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#14b8a6" letter-spacing="0.1em">SLA</text>
          <text x="220" y="32" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#f1f5f9" font-weight="700">98%</text>
        </g>
      </g>
    </g>

    <!-- BRIEFING -->
    <g transform="translate(360, 0)">
      <rect width="340" height="320" rx="8" fill="#1e293b" stroke="#38b6ff" stroke-width="1.5"/>
      <rect width="5" height="320" fill="#38b6ff"/>
      <g transform="translate(28, 32)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.12em">BRIEFING</text>
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" y="22" letter-spacing="0.1em">5–60 SECONDS</text>

        <text font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" y="64" font-weight="600">AI morning briefing</text>
        <text font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" y="86">Categorized insights.</text>
        <text font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" y="104">Prioritized actions.</text>
        <text font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" y="122">Cross-system correlations.</text>

        <!-- Mini briefing preview -->
        <g transform="translate(0, 156)">
          <rect width="280" height="80" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
          <text x="14" y="18" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#38b6ff" letter-spacing="0.1em">TODAY · 3 SIGNALS</text>
          <circle cx="18" cy="38" r="3" fill="#ef4444"/>
          <text x="28" y="42" font-family="Inter, sans-serif" font-size="11" fill="#cbd5e1">Vendor lapse + doc requests</text>
          <circle cx="18" cy="58" r="3" fill="#f59e0b"/>
          <text x="28" y="62" font-family="Inter, sans-serif" font-size="11" fill="#cbd5e1">Revenue anomaly Tuesday</text>
        </g>
      </g>
    </g>

    <!-- DEEP -->
    <g transform="translate(720, 0)">
      <rect width="320" height="320" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
      <rect width="5" height="320" fill="#8b5cf6"/>
      <g transform="translate(28, 32)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#8b5cf6" font-weight="700" letter-spacing="0.12em">DEEP</text>
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" y="22" letter-spacing="0.1em">1–5 MINUTES</text>

        <text font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" y="64" font-weight="600">Signal feed + concierge</text>
        <text font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" y="86">Full investigative depth.</text>
        <text font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" y="104">Freeform AI queries.</text>
        <text font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" y="122">Entity drilldowns.</text>

        <!-- Query box -->
        <g transform="translate(0, 156)">
          <rect width="260" height="40" rx="20" fill="#0f172a" stroke="#8b5cf6" stroke-width="1"/>
          <text x="20" y="25" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">Ask the platform...</text>
          <circle cx="232" cy="20" r="10" fill="#8b5cf6"/>
          <path d="M 228 20 L 236 20 M 232 16 L 236 20 L 232 24" stroke="#0f172a" stroke-width="1.5" fill="none"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Footer mark -->
  <g transform="translate(80, 600)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">FIGURE 1 · XEEDLY INTELLIGENCE ARCHITECTURE</text>
  </g>
  <g transform="translate(1120, 600)" text-anchor="end">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.08em">REF · DEPTH-MODEL-V1</text>
  </g>
</svg>
