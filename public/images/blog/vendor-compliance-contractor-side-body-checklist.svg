  <g transform="translate(80, 658)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">FIGURE 1 · CONTRACTOR COMPLIANCE MATRIX</text></g>
