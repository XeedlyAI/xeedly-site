      <text x="220" y="98" text-anchor="end">Workers&apos; Comp</text>
      <text x="220" y="148" text-anchor="end">Trade License</text>
      <text x="220" y="198" text-anchor="end">W-9</text>
      <text x="220" y="248" text-anchor="end">Commercial Auto</text>
