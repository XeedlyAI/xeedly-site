      <g><rect x="240" y="80" width="160" height="36" rx="4" fill="#1e293b" stroke="#10b981"/><circle cx="260" cy="98" r="4" fill="#10b981"/><text x="276" y="102" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#10b981" font-weight="700">CURRENT</text></g>
