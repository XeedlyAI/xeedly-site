    <!-- Status summary -->
    <g transform="translate(0, 320)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.1em" font-weight="700">SUMMARY</text>
      <g transform="translate(0, 22)">
        <circle cx="6" cy="6" r="5" fill="#10b981"/><text x="20" y="10" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#f1f5f9" font-weight="700">18 CURRENT</text>
        <g transform="translate(140, 0)"><circle cx="6" cy="6" r="5" fill="#f59e0b"/><text x="20" y="10" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#f59e0b" font-weight="700">1 RENEW SOON</text></g>
        <g transform="translate(310, 0)"><circle cx="6" cy="6" r="5" fill="#ef4444"/><text x="20" y="10" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700">1 LAPSED — RISK OF VENDOR REMOVAL</text></g>
