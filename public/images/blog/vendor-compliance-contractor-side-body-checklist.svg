      <g><rect x="420" y="230" width="160" height="36" rx="4" fill="#1e293b" stroke="#10b981"/><circle cx="440" cy="248" r="4" fill="#10b981"/><text x="456" y="252" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#10b981" font-weight="700">CURRENT</text></g>
      <g><rect x="600" y="230" width="160" height="36" rx="4" fill="#1e293b" stroke="#ef4444"/><circle cx="620" cy="248" r="4" fill="#ef4444"/><text x="636" y="252" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#ef4444" font-weight="700">LAPSED</text><text x="750" y="252" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#ef4444">EXP −3D</text></g>
      <g><rect x="780" y="230" width="160" height="36" rx="4" fill="#1e293b" stroke="#10b981"/><circle cx="800" cy="248" r="4" fill="#10b981"/><text x="816" y="252" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#10b981" font-weight="700">CURRENT</text></g>
