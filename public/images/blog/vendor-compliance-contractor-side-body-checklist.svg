      <g><rect x="420" y="30" width="160" height="36" rx="4" fill="#1e293b" stroke="#10b981"/><circle cx="440" cy="48" r="4" fill="#10b981"/><text x="456" y="52" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#10b981" font-weight="700">CURRENT</text><text x="570" y="52" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#94a3b8">EXP 03/2027</text></g>
      <g><rect x="600" y="30" width="160" height="36" rx="4" fill="#1e293b" stroke="#10b981"/><circle cx="620" cy="48" r="4" fill="#10b981"/><text x="636" y="52" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#10b981" font-weight="700">CURRENT</text><text x="750" y="52" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#94a3b8">EXP 03/2027</text></g>
      <g><rect x="780" y="30" width="160" height="36" rx="4" fill="#1e293b" stroke="#f59e0b"/><circle cx="800" cy="48" r="4" fill="#f59e0b"/><text x="816" y="52" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#f59e0b" font-weight="700">RENEW</text><text x="930" y="52" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#f59e0b">EXP 14D</text></g>

