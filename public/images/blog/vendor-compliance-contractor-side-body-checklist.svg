      <g><rect x="420" y="130" width="160" height="36" rx="4" fill="#1e293b" stroke="#10b981"/><circle cx="440" cy="148" r="4" fill="#10b981"/><text x="456" y="152" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#10b981" font-weight="700">CURRENT</text></g>
      <g><rect x="600" y="130" width="160" height="36" rx="4" fill="#1e293b" stroke="#10b981"/><circle cx="620" cy="148" r="4" fill="#10b981"/><text x="636" y="152" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#10b981" font-weight="700">CURRENT</text></g>
      <g><rect x="780" y="130" width="160" height="36" rx="4" fill="#1e293b" stroke="#10b981"/><circle cx="800" cy="148" r="4" fill="#10b981"/><text x="816" y="152" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#10b981" font-weight="700">CURRENT</text></g>

