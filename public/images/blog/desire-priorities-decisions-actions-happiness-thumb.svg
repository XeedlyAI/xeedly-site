<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img"><title>The Chain Framework</title>
<defs><pattern id="g" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M 48 0 L 0 0 0 48" fill="none" stroke="#e7e1d6" stroke-width="0.5" opacity="0.6"/></pattern></defs>
<rect width="1200" height="675" fill="#FAF7F2"/><rect width="1200" height="675" fill="url(#g)"/>
<g transform="translate(80, 80)">
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">PRINCIPAL-LIFE · #004</text>
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" y="24">MAGNETIZER · 6 MIN</text>
</g>
<!-- LEFT: The chain as 5 connected blocks -->
<g transform="translate(80, 210)">
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.15em" font-weight="700">THE CHAIN</text>

  <g transform="translate(0, 28)">
    <rect width="540" height="56" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <rect width="6" height="56" fill="#38b6ff"/>
    <text x="32" y="22" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700" letter-spacing="0.12em">01 · DESIRE</text>
    <text x="32" y="42" font-family="Inter, sans-serif" font-size="14" fill="#475569">What you actually want, beneath the noise</text>
  </g>

  <g transform="translate(260, 96)" stroke="#94a3b8" stroke-width="2" fill="none"><line x1="0" y1="0" x2="0" y2="14"/><polygon points="-5,10 0,18 5,10" fill="#94a3b8"/></g>

  <g transform="translate(0, 124)">
    <rect width="540" height="42" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <rect width="6" height="42" fill="#38b6ff"/>
    <text x="32" y="26" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#0f172a" font-weight="700" letter-spacing="0.12em">02 · PRIORITIES</text>
  </g>

  <g transform="translate(260, 178)" stroke="#94a3b8" stroke-width="2" fill="none"><line x1="0" y1="0" x2="0" y2="14"/><polygon points="-5,10 0,18 5,10" fill="#94a3b8"/></g>

  <g transform="translate(0, 206)">
    <rect width="540" height="42" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <rect width="6" height="42" fill="#38b6ff"/>
    <text x="32" y="26" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#0f172a" font-weight="700" letter-spacing="0.12em">03 · DECISIONS</text>
  </g>

  <g transform="translate(260, 260)" stroke="#94a3b8" stroke-width="2" fill="none"><line x1="0" y1="0" x2="0" y2="14"/><polygon points="-5,10 0,18 5,10" fill="#94a3b8"/></g>

  <g transform="translate(0, 288)">
    <rect width="540" height="42" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <rect width="6" height="42" fill="#38b6ff"/>
    <text x="32" y="26" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#0f172a" font-weight="700" letter-spacing="0.12em">04 · ACTIONS</text>
  </g>

  <g transform="translate(260, 342)" stroke="#94a3b8" stroke-width="2" fill="none"><line x1="0" y1="0" x2="0" y2="14"/><polygon points="-5,10 0,18 5,10" fill="#94a3b8"/></g>

  <g transform="translate(0, 370)">
    <rect width="540" height="42" rx="6" fill="#ffffff" stroke="#10b981"/>
    <rect width="6" height="42" fill="#10b981"/>
    <text x="32" y="26" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" font-weight="700" letter-spacing="0.12em">05 · HAPPINESS (OR ABSENCE)</text>
  </g>
</g>
<!-- RIGHT title -->
<g transform="translate(720, 260)">
  <text font-family="Inter, sans-serif" fill="#0f172a" font-weight="800" letter-spacing="-0.02em">
    <tspan x="0" y="0" font-size="44">Desire to</tspan>
    <tspan x="0" y="54" font-size="44">Happiness.</tspan>
    <tspan x="0" y="108" font-size="28" fill="#38b6ff">Walk it backward to find</tspan>
    <tspan x="0" y="138" font-size="28" fill="#38b6ff">where life went off-axis.</tspan>
  </text>
</g>
<g transform="translate(80, 620)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text></g>
<g transform="translate(1120, 620)" text-anchor="end"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.08em">BRIEFING #004 · LIVE</text></g>
</svg>
