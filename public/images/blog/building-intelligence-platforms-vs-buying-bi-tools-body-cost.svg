<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="b7-title">
  <title id="b7-title">Build vs buy total cost over 24 months</title>
  <defs>
    <pattern id="b7-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#0f172a"/>
  <rect width="1200" height="675" fill="url(#b7-grid)"/>

  <g transform="translate(80, 70)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">24-MONTH COST · 25 UNITS · 5–8 SYSTEMS</text>
    <text font-family="Inter, sans-serif" font-size="22" fill="#f1f5f9" font-weight="700" y="32">The math has changed</text>
  </g>

  <!-- Chart area -->
  <g transform="translate(120, 200)">
    <!-- Y-axis labels (cost) -->
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#64748b" letter-spacing="0.05em">
      <text x="-12" y="4" text-anchor="end">$500K</text>
      <text x="-12" y="84" text-anchor="end">$400K</text>
      <text x="-12" y="164" text-anchor="end">$300K</text>
      <text x="-12" y="244" text-anchor="end">$200K</text>
      <text x="-12" y="324" text-anchor="end">$100K</text>
      <text x="-12" y="384" text-anchor="end">$0</text>
    </g>

    <!-- Horizontal gridlines -->
    <g stroke="#1e293b" stroke-width="1">
      <line x1="0" y1="0" x2="940" y2="0"/>
      <line x1="0" y1="80" x2="940" y2="80"/>
      <line x1="0" y1="160" x2="940" y2="160"/>
      <line x1="0" y1="240" x2="940" y2="240"/>
      <line x1="0" y1="320" x2="940" y2="320"/>
      <line x1="0" y1="380" x2="940" y2="380" stroke="#475569" stroke-width="1.5"/>
    </g>

    <!-- BUY area (cumulative cost over 24 mo: setup + linear licensing) -->
    <!-- Range high: $410K @ y=72 (top of bar). Range low: $135K @ y=272. Show as a range area -->
    <!-- Path simulating cumulative cost over 24 mo. Start at setup (~$50K) and grow linearly to $410K -->
    <!-- y axis: 0=$500K, 380=$0 → 1px = $1316/px -->

    <!-- BUY HIGH path -->
    <path d="M 0 342 L 940 72" stroke="#ef4444" stroke-width="2.5" fill="none"/>
    <!-- BUY LOW path -->
    <path d="M 0 369 L 940 277" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="6 4"/>
    <!-- BUY range fill -->
    <path d="M 0 342 L 940 72 L 940 277 L 0 369 Z" fill="#ef4444" opacity="0.1"/>

    <!-- BUILD HIGH path -->
    <path d="M 0 360 L 940 343" stroke="#10b981" stroke-width="2.5" fill="none"/>
    <!-- BUILD LOW path -->
    <path d="M 0 376 L 940 367" stroke="#10b981" stroke-width="2" fill="none" stroke-dasharray="6 4"/>
    <!-- BUILD range fill -->
    <path d="M 0 360 L 940 343 L 940 367 L 0 376 Z" fill="#10b981" opacity="0.15"/>

    <!-- X-axis labels (months) -->
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#64748b" letter-spacing="0.05em">
      <line x1="0" y1="380" x2="0" y2="386" stroke="#475569" stroke-width="1.5"/>
      <text x="0" y="402" text-anchor="middle">MONTH 0</text>
      <line x1="235" y1="380" x2="235" y2="386" stroke="#475569" stroke-width="1.5"/>
      <text x="235" y="402" text-anchor="middle">MONTH 6</text>
      <line x1="470" y1="380" x2="470" y2="386" stroke="#475569" stroke-width="1.5"/>
      <text x="470" y="402" text-anchor="middle">MONTH 12</text>
      <line x1="705" y1="380" x2="705" y2="386" stroke="#475569" stroke-width="1.5"/>
      <text x="705" y="402" text-anchor="middle">MONTH 18</text>
      <line x1="940" y1="380" x2="940" y2="386" stroke="#475569" stroke-width="1.5"/>
      <text x="940" y="402" text-anchor="middle">MONTH 24</text>
    </g>

    <!-- End-of-curve labels -->
    <g transform="translate(950, 72)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700" letter-spacing="0.08em">$410K</text>
      <text y="14" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#fca5a5" letter-spacing="0.08em">BUY HIGH</text>
    </g>
    <g transform="translate(950, 280)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700" letter-spacing="0.08em">$135K</text>
      <text y="14" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#fca5a5" letter-spacing="0.08em">BUY LOW</text>
    </g>
    <g transform="translate(950, 346)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" font-weight="700" letter-spacing="0.08em">$49K</text>
      <text y="14" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#86efac" letter-spacing="0.08em">BUILD HIGH</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(80, 626)">
    <g transform="translate(0, 0)">
      <line x1="0" y1="6" x2="24" y2="6" stroke="#ef4444" stroke-width="2.5"/>
      <text x="32" y="10" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#fca5a5" letter-spacing="0.08em">BUY · ENTERPRISE BI (high-low range)</text>
    </g>
    <g transform="translate(380, 0)">
      <line x1="0" y1="6" x2="24" y2="6" stroke="#10b981" stroke-width="2.5"/>
      <text x="32" y="10" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#86efac" letter-spacing="0.08em">BUILD · CUSTOM + MANAGED INTELLIGENCE</text>
    </g>
    <g transform="translate(0, 22)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#475569" letter-spacing="0.1em">FIGURE 1 · 24-MONTH TOTAL COST OF OWNERSHIP</text>
    </g>
  </g>
</svg>
