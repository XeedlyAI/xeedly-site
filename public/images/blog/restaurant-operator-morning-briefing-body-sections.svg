<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img"><title>Six-section restaurant operator briefing</title>
<defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern></defs>
<rect width="1200" height="675" fill="#0f172a"/><rect width="1200" height="675" fill="url(#g)"/>
<g transform="translate(80, 70)">
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">SOVVRN · RESTAURANT OPERATOR BRIEFING</text>
  <text font-family="Inter, sans-serif" font-size="22" fill="#f1f5f9" font-weight="700" y="32">Six sections · delivered 6 AM · reads on commute</text>
</g>
<!-- 6 section cards in 2x3 grid -->
<g transform="translate(80, 180)">
  <g>
    <rect width="340" height="130" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <rect width="5" height="130" fill="#10b981"/>
    <g transform="translate(24, 32)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" font-weight="700" letter-spacing="0.12em">01 · REVENUE HEALTH</text>
      <text font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" y="28">Yesterday vs target by location</text>
      <text font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" y="52">Day-over-day · same-day-last-week</text>
      <text font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" y="72">Anomalies highlighted</text>
    </g>
  </g>
  <g transform="translate(360, 0)">
    <rect width="340" height="130" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <rect width="5" height="130" fill="#f59e0b"/>
    <g transform="translate(24, 32)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#f59e0b" font-weight="700" letter-spacing="0.12em">02 · COST POSITION</text>
      <text font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" y="28">Day-of-month confidence model</text>
      <text font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" y="52">Food · labor · overall margin trajectory</text>
      <text font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" y="72">Locations drifting flagged early</text>
    </g>
  </g>
  <g transform="translate(720, 0)">
    <rect width="340" height="130" rx="10" fill="#1e293b" stroke="#38b6ff" stroke-width="1.5"/>
    <rect width="5" height="130" fill="#38b6ff"/>
    <g transform="translate(24, 32)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700" letter-spacing="0.12em">03 · OPERATIONS</text>
      <text font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" y="28">Staffing · inventory · facility</text>
      <text font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" y="52">Call-outs · no-shows · vendor delays</text>
      <text font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" y="72">Equipment alerts</text>
    </g>
  </g>
  <!-- Row 2 -->
  <g transform="translate(0, 150)">
    <rect width="340" height="130" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect width="5" height="130" fill="#8b5cf6"/>
    <g transform="translate(24, 32)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#8b5cf6" font-weight="700" letter-spacing="0.12em">04 · VOICE INTELLIGENCE</text>
      <text font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" y="28">Calls · missed · sentiment · reservations</text>
      <text font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" y="52">Flagged calls (complaints, opps)</text>
      <text font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" y="72">Missed call rate trend</text>
    </g>
  </g>
  <g transform="translate(360, 150)">
    <rect width="340" height="130" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <rect width="5" height="130" fill="#10b981"/>
    <g transform="translate(24, 32)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" font-weight="700" letter-spacing="0.12em">05 · REVIEWS &amp; MARKETING</text>
      <text font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" y="28">Google · Yelp · OpenTable · social</text>
      <text font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" y="52">Cluster alerts (recurring complaints)</text>
      <text font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" y="72">Campaign performance</text>
    </g>
  </g>
  <g transform="translate(720, 150)">
    <rect width="340" height="130" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
    <rect width="5" height="130" fill="#ef4444"/>
    <g transform="translate(24, 32)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700" letter-spacing="0.12em">06 · TODAY&apos;S PRIORITIES</text>
      <text font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" y="28">3-5 things ranked by severity</text>
      <text font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" y="52">Operator scans · points the day</text>
      <text font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" y="72">Replaces reactive triage</text>
    </g>
  </g>
</g>
<g transform="translate(80, 540)">
  <rect width="1040" height="64" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="20" y="26" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" font-weight="700" letter-spacing="0.12em">FOR EVERY GM TOO</text>
  <text x="20" y="48" font-family="Inter, sans-serif" font-size="14" fill="#f1f5f9" font-weight="600">Location-specific sections auto-forwarded to the relevant GM · everyone gets the right slice asynchronously</text>
</g>
<g transform="translate(80, 638)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">FIGURE 1 · SIX-SECTION RESTAURANT BRIEFING</text></g>
</svg>
