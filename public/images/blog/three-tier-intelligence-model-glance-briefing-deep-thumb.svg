<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t4-title">
  <title id="t4-title">Three-Tier Intelligence Model — thumbnail</title>
  <defs>
    <pattern id="t4-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#bae6fd" stroke-width="0.5" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Pale blue wash background -->
  <rect width="1200" height="675" fill="#F0F9FF"/>
  <rect width="1200" height="675" fill="url(#t4-grid)"/>

  <g transform="translate(80, 80)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#0A8FD4" font-weight="700" letter-spacing="0.15em">PRINCIPAL-INTELLIGENCE · #004</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#64748b" letter-spacing="0.1em" y="22">MAGNETIZER · 8 MIN</text>
  </g>

  <!-- DOMINANT ELEMENT: Three stacked time-budget cards -->
  <g transform="translate(80, 180)">
    <!-- GLANCE -->
    <g>
      <rect x="2" y="2" width="540" height="100" rx="8" fill="#0f172a" opacity="0.06"/>
      <rect width="540" height="100" rx="8" fill="#ffffff" stroke="#14B8A6" stroke-width="1.5"/>
      <rect width="5" height="100" fill="#14B8A6"/>
      <g transform="translate(28, 22)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#0F766E" font-weight="700" letter-spacing="0.1em">GLANCE</text>
        <text x="120" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#64748b" letter-spacing="0.08em">0–5 SECONDS</text>
        <text x="0" y="32" font-family="Inter, sans-serif" font-size="14" fill="#0f172a" font-weight="600">KPI ticker · ambient awareness</text>
        <text x="0" y="56" font-family="Inter, sans-serif" font-size="12" fill="#64748b">No clicks. No logins. No dashboards.</text>
      </g>
    </g>

    <!-- BRIEFING -->
    <g transform="translate(0, 120)">
      <rect x="2" y="2" width="540" height="100" rx="8" fill="#0f172a" opacity="0.06"/>
      <rect width="540" height="100" rx="8" fill="#ffffff" stroke="#38b6ff" stroke-width="1.5"/>
      <rect width="5" height="100" fill="#38b6ff"/>
      <g transform="translate(28, 22)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#0A8FD4" font-weight="700" letter-spacing="0.1em">BRIEFING</text>
        <text x="120" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#64748b" letter-spacing="0.08em">5–60 SECONDS</text>
        <text x="0" y="32" font-family="Inter, sans-serif" font-size="14" fill="#0f172a" font-weight="600">AI morning briefing</text>
        <text x="0" y="56" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Categorized, prioritized, delivered.</text>
      </g>
    </g>

    <!-- DEEP -->
    <g transform="translate(0, 240)">
      <rect x="2" y="2" width="540" height="100" rx="8" fill="#0f172a" opacity="0.06"/>
      <rect width="540" height="100" rx="8" fill="#ffffff" stroke="#8B5CF6" stroke-width="1.5"/>
      <rect width="5" height="100" fill="#8B5CF6"/>
      <g transform="translate(28, 22)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#7C3AED" font-weight="700" letter-spacing="0.1em">DEEP</text>
        <text x="120" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#64748b" letter-spacing="0.08em">1–5 MINUTES</text>
        <text x="0" y="32" font-family="Inter, sans-serif" font-size="14" fill="#0f172a" font-weight="600">Signal feed · AI concierge</text>
        <text x="0" y="56" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Investigation when you need it.</text>
      </g>
    </g>
  </g>

  <!-- Right side title -->
  <g transform="translate(680, 220)">
    <text font-family="Inter, sans-serif" fill="#0f172a" font-weight="800" letter-spacing="-0.02em">
      <tspan x="0" y="0" font-size="42">Three tiers.</tspan>
      <tspan x="0" y="52" font-size="42" fill="#38b6ff">Zero noise.</tspan>
    </text>
    <text font-family="Inter, sans-serif" font-size="14" fill="#475569" letter-spacing="0" y="92">
      <tspan x="0">Why intelligence platforms</tspan>
      <tspan x="0" y="112">cover all three depths.</tspan>
    </text>
  </g>

  <g transform="translate(80, 620)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text>
  </g>
  <g transform="translate(1120, 620)" text-anchor="end">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.08em">BRIEFING-004 · LIVE</text>
  </g>
</svg>
