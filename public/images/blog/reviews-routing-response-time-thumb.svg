        <text font-family="Inter, sans-serif" font-size="22" fill="#f1f5f9" font-weight="800" y="32">RESPONSE</text>
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.08em" y="54">SPEED TO QUOTE</text>
