      <rect width="5" height="320" fill="#38b6ff"/>
      <g transform="translate(18, 28)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.1em">LEVER 02</text>
        <text font-family="Inter, sans-serif" font-size="22" fill="#f1f5f9" font-weight="800" y="32">ROUTING</text>
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.08em" y="54">DENSITY · CLUSTERING</text>
        <text font-family="Inter, sans-serif" font-size="12" fill="#cbd5e1" y="92">Drives margin per hour.</text>
        <text font-family="Inter, sans-serif" font-size="12" fill="#cbd5e1" y="112">Cluster by geography.</text>
        <text font-family="Inter, sans-serif" font-size="12" fill="#cbd5e1" y="132">HOAs are gold here.</text>
        <g transform="translate(0, 180)">
          <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#38b6ff" letter-spacing="0.08em" font-weight="700">METRIC TO TRACK</text>
          <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#f1f5f9" y="20" font-weight="700">JOBS / RADIUS</text>
        </g>
      </g>
    </g>
    <!-- Lever 3: Response -->
    <g transform="translate(380, 0)">
      <rect width="170" height="320" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
      <rect width="5" height="320" fill="#8b5cf6"/>
