      <tspan x="0" y="42" font-size="34">Routing.</tspan>
      <tspan x="0" y="84" font-size="34" fill="#38b6ff">Response time.</tspan>
    </text>
    <text font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" y="124"><tspan x="0">The three operational levers</tspan><tspan x="0" y="20">that drive home services</tspan><tspan x="0" y="40">growth more than any ad.</tspan></text>
  </g>
  <g transform="translate(80, 620)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text></g>
  <g transform="translate(1120, 620)" text-anchor="end"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.08em">BRIEFING HS-7 · LIVE</text></g>
