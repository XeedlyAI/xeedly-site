        <text font-family="Inter, sans-serif" font-size="12" fill="#cbd5e1" y="112">Same-day = 2–3× wins.</text>
        <text font-family="Inter, sans-serif" font-size="12" fill="#cbd5e1" y="132">AI agents answer 24/7.</text>
        <g transform="translate(0, 180)">
          <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#8b5cf6" letter-spacing="0.08em" font-weight="700">METRIC TO TRACK</text>
          <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#f1f5f9" y="20" font-weight="700">FIRST-RESP HRS</text>
