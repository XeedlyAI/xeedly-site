<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t15-title">
  <title id="t15-title">Reviews Routing Response Time — thumbnail</title>
  <defs><pattern id="t15-grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern></defs>
  <rect width="1200" height="675" fill="#0f172a"/><rect width="1200" height="675" fill="url(#t15-grid)"/>
  <g transform="translate(80, 80)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">MULTI-UNIT-OPS · HS-7</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" y="24">HIGH-INTENT COMMERCIAL · 7 MIN</text>
  </g>

  <!-- LEFT: 3 lever cards, simplified — just label and number -->
  <g transform="translate(80, 200)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#94a3b8" letter-spacing="0.15em" font-weight="700">THE 3 GROWTH LEVERS</text>

    <!-- 3 simple cards stacked -->
    <g transform="translate(0, 32)">
      <rect width="540" height="100" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
      <rect width="8" height="100" fill="#10b981"/>
      <g transform="translate(36, 32)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#10b981" font-weight="700" letter-spacing="0.15em">01</text>
        <text font-family="Inter, sans-serif" font-size="30" fill="#ffffff" font-weight="800" x="56" y="0">Reviews</text>
        <text font-family="Inter, sans-serif" font-size="16" fill="#94a3b8" y="32" x="56">Volume + recency drive rank</text>
      </g>
    </g>

    <g transform="translate(0, 152)">
      <rect width="540" height="100" rx="10" fill="#1e293b" stroke="#38b6ff" stroke-width="1.5"/>
      <rect width="8" height="100" fill="#38b6ff"/>
      <g transform="translate(36, 32)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">02</text>
        <text font-family="Inter, sans-serif" font-size="30" fill="#ffffff" font-weight="800" x="56" y="0">Routing</text>
        <text font-family="Inter, sans-serif" font-size="16" fill="#94a3b8" y="32" x="56">Density drives margin per hour</text>
      </g>
    </g>

    <g transform="translate(0, 272)">
      <rect width="540" height="100" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
      <rect width="8" height="100" fill="#8b5cf6"/>
      <g transform="translate(36, 32)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#8b5cf6" font-weight="700" letter-spacing="0.15em">03</text>
        <text font-family="Inter, sans-serif" font-size="30" fill="#ffffff" font-weight="800" x="56" y="0">Response</text>
        <text font-family="Inter, sans-serif" font-size="16" fill="#94a3b8" y="32" x="56">Speed drives close rate 2–3×</text>
      </g>
    </g>
  </g>

  <!-- RIGHT: Big title -->
  <g transform="translate(720, 240)">
    <text font-family="Inter, sans-serif" fill="#ffffff" font-weight="800" letter-spacing="-0.02em">
      <tspan x="0" y="0" font-size="44">The Three</tspan>
      <tspan x="0" y="54" font-size="44">Operational</tspan>
      <tspan x="0" y="138" font-size="44" fill="#38b6ff">Growth Levers.</tspan>
    </text>
  </g>

  <g transform="translate(80, 620)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text></g>
  <g transform="translate(1120, 620)" text-anchor="end"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.08em">BRIEFING HS-7 · LIVE</text></g>
</svg>
