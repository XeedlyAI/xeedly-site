<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img"><title>Founder Mode Trap</title>
<defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern></defs>
<rect width="1200" height="675" fill="#0f172a"/><rect width="1200" height="675" fill="url(#g)"/>
<g transform="translate(80, 80)">
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">PRINCIPAL-LIFE · #006</text>
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#64748b" letter-spacing="0.1em" y="24">COMPLETER · 6 MIN</text>
</g>
<!-- LEFT: 3 cost cards -->
<g transform="translate(80, 200)">
  <rect width="540" height="380" rx="14" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <rect width="8" height="380" fill="#ef4444"/>
  <g transform="translate(36, 56)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#ef4444" font-weight="700" letter-spacing="0.15em">THE FOUNDER MODE TRAP</text>
    <text font-family="Inter, sans-serif" font-size="22" fill="#f1f5f9" font-weight="800" y="40">Three costs that compound</text>
  </g>
  <g transform="translate(36, 180)" font-family="Inter, sans-serif" font-size="18" fill="#cbd5e1" font-weight="600">
    <g><circle cx="10" cy="-6" r="9" fill="#ef4444"/><text x="32" y="0">Your health</text><text x="468" y="0" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">CUT FIRST</text></g>
    <g transform="translate(0, 50)"><circle cx="10" cy="-6" r="9" fill="#ef4444"/><text x="32" y="0">Team capability</text><text x="468" y="0" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">SHALLOWER</text></g>
    <g transform="translate(0, 100)"><circle cx="10" cy="-6" r="9" fill="#ef4444"/><text x="32" y="0">Company ceiling</text><text x="468" y="0" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">CAPPED</text></g>
  </g>
  <line x1="36" y1="338" x2="504" y2="338" stroke="#334155"/>
  <g transform="translate(36, 358)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" font-weight="700" letter-spacing="0.1em">FIX IS ARCHITECTURAL · NOT WILLPOWER</text></g>
</g>
<!-- RIGHT title -->
<g transform="translate(720, 270)">
  <text font-family="Inter, sans-serif" fill="#ffffff" font-weight="800" letter-spacing="-0.02em">
    <tspan x="0" y="0" font-size="50">Founder</tspan>
    <tspan x="0" y="60" font-size="50">Mode</tspan>
    <tspan x="0" y="120" font-size="50" fill="#ef4444">Trap.</tspan>
  </text>
</g>
<g transform="translate(80, 620)"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text></g>
<g transform="translate(1120, 620)" text-anchor="end"><text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.08em">BRIEFING #006 · LIVE</text></g>
