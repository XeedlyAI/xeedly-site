<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t3-title">
  <title id="t3-title">Build a Business That Runs Without You — thumbnail</title>
  <defs>
    <pattern id="t3-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#e7e1d6" stroke-width="0.5" opacity="0.6"/>
    </pattern>
  </defs>

  <!-- Soft cream background -->
  <rect width="1200" height="675" fill="#FAF7F2"/>
  <rect width="1200" height="675" fill="url(#t3-grid)"/>

  <g transform="translate(80, 80)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">PRINCIPAL-LIFE · #003</text>
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#64748b" letter-spacing="0.1em" y="22">FRONT-DOOR · 7 MIN</text>
  </g>

  <!-- DOMINANT ELEMENT: 5-question scorecard -->
  <g transform="translate(80, 180)">
    <rect x="2" y="2" width="560" height="380" rx="10" fill="#0f172a" opacity="0.04"/>
    <rect width="560" height="380" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="5" height="380" fill="#38b6ff"/>

    <g transform="translate(28, 32)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700" letter-spacing="0.12em">THE FIVE-QUESTION TEST</text>
      <text font-family="Inter, sans-serif" font-size="18" fill="#0f172a" font-weight="700" y="28">Does your business run without you?</text>
    </g>

    <line x1="28" y1="92" x2="532" y2="92" stroke="#e2e8f0" stroke-width="1"/>

    <!-- 5 questions, each numbered -->
    <g transform="translate(28, 112)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700">01</text>
      <text x="32" y="0" font-family="Inter, sans-serif" font-size="13" fill="#334155">% of inbox = decision requests?</text>
    </g>
    <g transform="translate(28, 156)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700">02</text>
      <text x="32" y="0" font-family="Inter, sans-serif" font-size="13" fill="#334155">Vacation = collapse or continuity?</text>
    </g>
    <g transform="translate(28, 200)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700">03</text>
      <text x="32" y="0" font-family="Inter, sans-serif" font-size="13" fill="#334155">Standards in head or in system?</text>
    </g>
    <g transform="translate(28, 244)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700">04</text>
      <text x="32" y="0" font-family="Inter, sans-serif" font-size="13" fill="#334155">Last full day of strategic work?</text>
    </g>
    <g transform="translate(28, 288)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#38b6ff" font-weight="700">05</text>
      <text x="32" y="0" font-family="Inter, sans-serif" font-size="13" fill="#334155">2× growth = more or less bottleneck?</text>
    </g>

    <line x1="28" y1="340" x2="532" y2="340" stroke="#e2e8f0" stroke-width="1"/>
    <g transform="translate(28, 358)">
      <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="0.08em">UNCOMFORTABLE ANSWERS → ARCHITECTURE PROBLEM</text>
    </g>
  </g>

  <g transform="translate(700, 220)">
    <text font-family="Inter, sans-serif" fill="#0f172a" font-weight="800" letter-spacing="-0.02em">
      <tspan x="0" y="0" font-size="40">Build a</tspan>
      <tspan x="0" y="48" font-size="40">business</tspan>
      <tspan x="0" y="96" font-size="40" fill="#38b6ff">that runs</tspan>
      <tspan x="0" y="144" font-size="40" fill="#38b6ff">without you.</tspan>
    </text>
    <text font-family="Inter, sans-serif" font-size="13" fill="#64748b" letter-spacing="0" y="178">
      <tspan x="0">Not so you can step away.</tspan>
      <tspan x="0" y="198">So you can lead.</tspan>
    </text>
  </g>

  <g transform="translate(80, 620)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.12em">XEEDLY · THE BRIEFINGS</text>
  </g>
  <g transform="translate(1120, 620)" text-anchor="end">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.08em">BRIEFING-003 · LIVE</text>
  </g>
</svg>
