<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="b6-title">
  <title id="b6-title">Same business outcomes, opposite personal outcomes</title>
  <defs>
    <pattern id="b6-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#0f172a"/>
  <rect width="1200" height="675" fill="url(#b6-grid)"/>

  <g transform="translate(80, 70)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#38b6ff" font-weight="700" letter-spacing="0.15em">CAGE VS CATALYST · SAME BUSINESS, DIFFERENT LIFE</text>
    <text font-family="Inter, sans-serif" font-size="22" fill="#f1f5f9" font-weight="700" y="32">Both produce strong financial results. Only one gives you a life back.</text>
  </g>

  <!-- Two columns -->
  <g transform="translate(80, 180)">
    <!-- CAGE column -->
    <g>
      <rect width="520" height="430" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
      <rect width="5" height="430" fill="#ef4444"/>
      <g transform="translate(28, 32)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#ef4444" font-weight="700" letter-spacing="0.15em">CAGE MODEL</text>
        <text font-family="Inter, sans-serif" font-size="20" fill="#f1f5f9" font-weight="700" y="28">Business consumes the builder</text>
      </g>
      <line x1="28" y1="92" x2="492" y2="92" stroke="#334155" stroke-width="1"/>

      <g transform="translate(28, 116)" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1">
        <g><circle cx="6" cy="-4" r="3" fill="#ef4444"/><text x="22" y="0">Revenue growing</text></g>
        <g transform="translate(0, 36)"><circle cx="6" cy="-4" r="3" fill="#ef4444"/><text x="22" y="0">Operations functioning</text></g>
        <g transform="translate(0, 72)"><circle cx="6" cy="-4" r="3" fill="#ef4444"/><text x="22" y="0">Team performing</text></g>
        <g transform="translate(0, 108)"><circle cx="6" cy="-4" r="3" fill="#ef4444"/><text x="22" y="0">Leader in every decision</text></g>
        <g transform="translate(0, 144)"><circle cx="6" cy="-4" r="3" fill="#ef4444"/><text x="22" y="0">Calendar consumed by ops</text></g>
        <g transform="translate(0, 180)"><circle cx="6" cy="-4" r="3" fill="#ef4444"/><text x="22" y="0">Mental space taken</text></g>
        <g transform="translate(0, 216)"><circle cx="6" cy="-4" r="3" fill="#ef4444"/><text x="22" y="0">Family time displaced</text></g>
        <g transform="translate(0, 252)"><circle cx="6" cy="-4" r="3" fill="#ef4444"/><text x="22" y="0">Identity = the business</text></g>
      </g>

      <g transform="translate(28, 400)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#ef4444" letter-spacing="0.08em" font-weight="700">PERSONAL OUTCOME: CONSUMED</text>
      </g>
    </g>

    <!-- CATALYST column -->
    <g transform="translate(560, 0)">
      <rect width="480" height="430" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
      <rect width="5" height="430" fill="#10b981"/>
      <g transform="translate(28, 32)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#10b981" font-weight="700" letter-spacing="0.15em">CATALYST MODEL</text>
        <text font-family="Inter, sans-serif" font-size="20" fill="#f1f5f9" font-weight="700" y="28">Business catalyzes the builder</text>
      </g>
      <line x1="28" y1="92" x2="452" y2="92" stroke="#334155" stroke-width="1"/>

      <g transform="translate(28, 116)" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1">
        <g><circle cx="6" cy="-4" r="3" fill="#10b981"/><text x="22" y="0">Revenue growing</text></g>
        <g transform="translate(0, 36)"><circle cx="6" cy="-4" r="3" fill="#10b981"/><text x="22" y="0">Operations functioning</text></g>
        <g transform="translate(0, 72)"><circle cx="6" cy="-4" r="3" fill="#10b981"/><text x="22" y="0">Team performing</text></g>
        <g transform="translate(0, 108)"><circle cx="6" cy="-4" r="3" fill="#10b981"/><text x="22" y="0">Leader in strategic decisions only</text></g>
        <g transform="translate(0, 144)"><circle cx="6" cy="-4" r="3" fill="#10b981"/><text x="22" y="0">Calendar has margin</text></g>
        <g transform="translate(0, 180)"><circle cx="6" cy="-4" r="3" fill="#10b981"/><text x="22" y="0">Mental space restored</text></g>
        <g transform="translate(0, 216)"><circle cx="6" cy="-4" r="3" fill="#10b981"/><text x="22" y="0">Family time honored</text></g>
        <g transform="translate(0, 252)"><circle cx="6" cy="-4" r="3" fill="#10b981"/><text x="22" y="0">Identity bigger than the business</text></g>
      </g>

      <g transform="translate(28, 400)">
        <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#10b981" letter-spacing="0.08em" font-weight="700">PERSONAL OUTCOME: BECOMING</text>
      </g>
    </g>
  </g>

  <g transform="translate(80, 638)">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="0.12em">FIGURE 1 · CAGE VS CATALYST OUTCOMES</text>
  </g>
</svg>
